*{box-sizing:border-box;font-family:'Noto Sans JP',system-ui,sans-serif}body{margin:0;min-height:100vh;color:#07132f;background:radial-gradient(circle at 85% 8%,rgba(0,30,98,.08),transparent 24%),linear-gradient(135deg,#fff,#eef4ff 58%,#fbfdff)}body:before{content:"";position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(45deg,rgba(0,30,98,.035) 0,rgba(0,30,98,.035) 2px,transparent 2px,transparent 24px)}.panel{background:rgba(255,255,255,.95);border:1px solid rgba(0,30,98,.10);box-shadow:0 18px 50px rgba(0,30,98,.10);backdrop-filter:blur(10px)}.blue{background:#001E62;color:white}.gold{background:#FACC15;color:#001E62}.logo{width:190px;max-width:42vw}.logo-sm{width:128px}.btn:active{transform:scale(.975)}.btn:disabled{cursor:not-allowed}.bar{height:100%;width:100%;transform-origin:left;background:linear-gradient(90deg,#001E62,#3B82F6)}.v svg{display:block;width:100%;height:auto;border-radius:22px}.host{height:100vh;overflow:hidden;padding:20px 26px}.hh{height:86px}.hc{height:calc(100vh - 106px);overflow:hidden}.safe{padding-bottom:env(safe-area-inset-bottom)}.fade{animation:fade .18s ease-out}.pulse{animation:pulse 1.4s infinite}.rank1{background:#FACC15;color:#001E62}.rankN{background:#F4F7FF;color:#001E62}.barwrap{overflow:hidden}.shake{animation:shake .45s}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.025)}}@keyframes shake{20%,80%{transform:translateX(5px)}40%,60%{transform:translateX(-7px)}}@media(max-width:900px){.host{height:auto;overflow:auto;padding:16px}.hc{height:auto}.logo{width:150px}.logo-sm{width:112px}}

<script>
'use strict';
var BROKER='wss://broker.emqx.io:8084/mqtt';
var PREFIX='partyquiz/asv-fixed-v14';
var LOGO='https://upload.wikimedia.org/wikipedia/commons/b/b1/Asics_Logo.svg';
var MAX_WRONG=7;
var QT=20;
var UI={ja:{name:'ニックネームを入力',enter:'入室する',wait:'待機中',joined:'入室しました。開始までお待ちください。',choose:'答えを1つ選んでください。',sent:'送信しました。大画面をご覧ください。',sendFail:'未接続です。もう一度お試しください。',right:'正解です！',wrong:'残念、不正解です',correct:'正解',exp:'解説',wrongCount:'不正解数',next:'次の問題までお待ちください。',score:'あなたのスコア',done:'お疲れさまでした！',left:'残り時間',reconnecting:'再接続中...',rejoin:'前回のルームに戻る',resumeHost:'Hostルームを復元',timeup:'時間切れ',pending:'次の問題から参加'},zh:{name:'輸入暱稱',enter:'進入房間',wait:'等待中',joined:'已進入房間，請等待開始。',choose:'請選擇一個答案。',sent:'已送出，請看大螢幕。',sendFail:'目前未連線，請稍後再試。',right:'答對了！',wrong:'很可惜，答錯了',correct:'正確答案',exp:'解說',wrongCount:'答錯題數',next:'請等待下一題。',score:'你的分數',done:'辛苦了！',left:'剩餘時間',reconnecting:'重新連線中...',rejoin:'回到上次房間',resumeHost:'恢復 Host 房間',timeup:'時間到',pending:'下一題開始參加'},en:{name:'Enter your nickname',enter:'Enter Room',wait:'Waiting',joined:'You have joined the room. Please wait for the game to start.',choose:'Please choose one answer.',sent:'Submitted. Please look at the main screen.',sendFail:'Not connected. Please try again.',right:'Correct!',wrong:'Sorry, incorrect.',correct:'Correct Answer',exp:'Explanation',wrongCount:'Wrong Answers',next:'Please wait for the next question.',score:'Your Score',done:'Thank you for playing!',left:'Time left',reconnecting:'Reconnecting...',rejoin:'Rejoin Last Room',resumeHost:'Resume Host Room',timeup:'Time up',pending:'Join from next question'}};
var Q=[
{t:'ASICSの創業年はいつ？',o:['1920年','1949年','1965年','1977年'],c:1,k:'founding',a:'1949年',s:'ASICS創業年',e:'スポーツによる健全な青少年の育成を目的に鬼塚株式会社を設立。'},
{t:'初めて作られたシューズは何？',o:['ランニング','サッカー','バスケットボール','テニス'],c:2,k:'basket',a:'バスケットボール',s:'最初のシューズ',e:'最も難しいと言われていたバスケットボールシューズを手掛けたのは「最初に高いハードルを超えられれば、その後のハードルもどんどん超えられる！」という鬼塚喜八郎の考えから。'},
{t:'バスケットボールシューズのアイデアの元になった食べ物はどれ？',o:['カメ（硬い甲羅）','タコ（吸盤で吸着）','サメ（速く泳ぐ）','カンガルー（跳ねる力）'],c:1,k:'octopus',a:'タコ（吸盤で吸着）',s:'タコの吸盤から着想',e:'夕飯にタコの酢の物を見て思いついた。ソール全体をタコの吸盤のように凹みを深くすることでストップ性とスタート性を高めた。'},
{t:'ASICSが展開する「OneASICS」の会員数は？',o:['1400万人','1800万人','2300万人','2800万人'],c:2,k:'members',a:'2300万人',s:'OneASICS会員数',e:'2025年時点、2313万人、24年対比31％の増加。レース登録会社を通じて、グローバルでデジタルを活用したアシックスならではのランニング体験を提供し、ブランド体験価値向上を図る。'},
{t:'海上輸送において「TEU」とは何を表す単位？',o:['20フィートコンテナ1本分','40フィートコンテナ1本分','輸送重量1トン','船舶の総トン数'],c:0,k:'container',a:'20フィートコンテナ1本分',s:'TEUの意味',e:'TEU（Twenty-foot Equivalent Unit）は20フィートコンテナを基準とした単位です。40フィートコンテナは2TEUとなります。'},
{t:'サプライチェーン管理において「JIT」が意味するものはどれ？',o:['Just in Time','Joint Inventory Tracking','Japanese Import Tariff','Just in Transit'],c:0,k:'jit',a:'Just in Time',s:'JITの意味',e:'JIT（ジャスト・イン・タイム）は必要なものを、必要なときに、必要な量だけ供給する概念です。在庫コストの削減や効率化に貢献します。'},
{t:'ASICSのサステナビリティ目標として正しいものはどれ？',o:['2050年までにカーボンニュートラル達成','2030年までに全製品をリサイクル素材に切り替え','2025年までに物流CO₂をゼロに','2040年までに廃棄物ゼロ工場を実現'],c:0,k:'sustainability',a:'2050年までにカーボンニュートラル達成',s:'ASICSのサステナビリティ目標',e:'ASICSは2030年までに温室効果ガス排出量を63%削減し、2050年までにネットゼロを達成することを目標に掲げています。'}
];
var app=document.getElementById('app');
var role=null,room=null,base=null,client=null,chart=null,hostTimer=null,hostRAF=null,playerRAF=null,timeOffset=0,lastPlayerState=null,playerViewKey='',subscribed={},lastHostSave=0;
var host={phase:'home',players:{},qi:-1,answers:{},remain:QT,result:null,connected:false,endsAt:0};
var player=createFreshPlayer();
function lang(){return localStorage.getItem('quizLangFix4')||'ja'}
function setLang(l){localStorage.setItem('quizLangFix4',l)}
function T(k){return (UI[lang()]||UI.ja)[k]||k}
function qText(q){return q.t}function opts(q){return q.o}function aText(q){return q.a}function subText(q){return q.s}function expText(q){return q.e}
function esc(x){return String(x==null?'':x).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]})}
function icon(n,c){c=c||'w-6 h-6';var map={play:'<polygon points="6 3 20 12 6 21 6 3"/>',phone:'<rect x="7" y="2" width="10" height="20" rx="2"/>',monitor:'<path d="M3 5h18v11H3z"/><path d="M8 21h8"/><path d="M12 16v5"/>',wifi:'<path d="M5 13a10 10 0 0 1 14 0"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M12 20h.01"/>',off:'<path d="m2 2 20 20"/>',check:'<path d="M20 6 9 17l-5-5"/>',x:'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',trophy:'<path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v7a5 5 0 0 1-10 0V4z"/>'};return '<svg class="'+c+' inline-block" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">'+(map[n]||'')+'</svg>'}
function toast(s){var t=document.getElementById('toast');t.textContent=s;t.classList.remove('hidden');clearTimeout(toast._t);toast._t=setTimeout(function(){t.classList.add('hidden')},1800)}
function loadIdentity(){var s={};try{s=JSON.parse(localStorage.getItem('quizPlayerIdentityFix4')||'{}')}catch(e){}var id=s.id||(window.crypto&&crypto.randomUUID?crypto.randomUUID():'p_'+Math.random().toString(36).slice(2));return {id:id,name:s.name||''}}
function createFreshPlayer(){var idn=loadIdentity();return {id:idn.id,name:idn.name,score:0,wrong:0,eliminated:false,selected:null,locked:false,lastQi:-1,connected:false}}
function savePlayerIdentity(){localStorage.setItem('quizPlayerIdentityFix4',JSON.stringify({id:player.id,name:player.name}))}
function saveRoom(){try{if(room){localStorage.setItem('quizLastRoomFix4',room);localStorage.setItem('quizPlayerRoomFix4',room)}}catch(e){}}
function lastRoom(){try{return localStorage.getItem('quizPlayerRoomFix4')||localStorage.getItem('quizLastRoomFix4')||''}catch(e){return''}}
function saveHostState(force){try{var now=Date.now();if(!force&&now-lastHostSave<3000)return;lastHostSave=now;if(role==='host'&&room)localStorage.setItem('quizHostStateFix4',JSON.stringify({room:room,host:host}))}catch(e){}}
function loadHostState(){try{return JSON.parse(localStorage.getItem('quizHostStateFix4')||'null')}catch(e){return null}}
function clearHostState(){try{localStorage.removeItem('quizHostStateFix4')}catch(e){}}
function makeRoom(){var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';var r='';for(var i=0;i<8;i++)r+=c[Math.floor(Math.random()*c.length)];return r}
function makeBase(r){return PREFIX+'/'+r}
function all(){return Object.values(host.players)}
function activePlayers(){return all().filter(function(p){return !p.eliminated&&!p.pending})}
function ranks(){return all().slice().sort(function(a,b){return b.score-a.score||a.wrong-b.wrong}).slice(0,5)}
function joinURL(){var u=new URL(location.href);u.search='';u.searchParams.set('room',room);return u.toString()}
function pub(t,p,opt){if(!client||!client.connected)return false;try{client.publish(t,JSON.stringify(p),Object.assign({qos:1},opt||{}));return true}catch(e){console.error(e);return false}}
function safeSubscribe(topic){if(!client||!client.connected||subscribed[topic])return;client.subscribe(topic);subscribed[topic]=true}
function disconnectClient(){if(client){try{client.removeAllListeners();client.end(true)}catch(e){}}client=null;subscribed={}}
function connect(cb){if(!window.mqtt){toast('MQTT load error');return}if(client&&client.connected){if(cb)cb();return}if(client)disconnectClient();client=mqtt.connect(BROKER,{clientId:'quiz_'+role+'_'+Math.random().toString(36).slice(2,10),clean:true,reconnectPeriod:2000,connectTimeout:8000});client.on('connect',function(){if(role==='host')host.connected=true;else player.connected=true;if(cb)cb();updateConn()});client.on('close',function(){if(role==='host')host.connected=false;else player.connected=false;updateConn()});client.on('message',function(t,m){var d;try{d=JSON.parse(m.toString())}catch(e){return}if(role==='host')onHost(d);else onPlayer(d)})}
function updateConn(){document.querySelectorAll('[data-conn]').forEach(function(el){var ok=role==='host'?host.connected:player.connected;el.className='inline-flex items-center gap-2 rounded-full px-4 py-2 font-black '+(ok?'bg-green-400 text-[#001E62]':'bg-red-500 text-white');el.innerHTML=icon(ok?'wifi':'off','w-4 h-4')+(ok?'Connected':'Reconnecting')})}
function optionLabel(i){return String.fromCharCode(65+i)}
function langSelect(compact){return '<select data-lang class="'+(compact?'rounded-xl border px-2 py-1 text-xs':'mb-4 rounded-2xl border px-4 py-3')+' font-black text-[#001E62]"><option value="ja" '+(lang()==='ja'?'selected':'')+'>日本語</option><option value="zh" '+(lang()==='zh'?'selected':'')+'>'+(compact?'繁中':'繁體中文')+'</option><option value="en" '+(lang()==='en'?'selected':'')+'>'+(compact?'EN':'English')+'</option></select>'}
function visual(k,title,sub){var m={founding:'<text x="295" y="310" font-size="100" fill="#FACC15" font-weight="900">1949</text>',basket:'<circle cx="560" cy="260" r="82" fill="#F97316"/><path d="M478 260h164M560 178v164M505 205c45 45 65 90 62 137M615 205c-45 45-65 90-62 137" stroke="#7C2D12" stroke-width="10" fill="none"/>',octopus:'<circle cx="450" cy="220" r="90" fill="#FB7185"/><path d="M370 300c-45 25-70 60-95 95M415 310c-25 45-40 75-45 110M465 315c5 50 5 75 0 110M515 310c30 45 45 75 55 110M565 300c50 25 80 55 105 95" stroke="#FB7185" stroke-width="30" stroke-linecap="round" fill="none"/>',members:'<text x="315" y="300" font-size="76" fill="#FACC15" font-weight="900">2300万人</text>',container:'<rect x="210" y="190" width="480" height="210" rx="18" fill="#E8F1FF"/><text x="365" y="155" font-size="72" fill="#FACC15" font-weight="900">TEU</text>',jit:'<path d="M210 290h420" stroke="#FACC15" stroke-width="28" stroke-linecap="round"/><path d="M600 230l90 60-90 60" stroke="#FACC15" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/><text x="330" y="215" font-size="70" fill="#fff" font-weight="900">JIT</text>',sustainability:'<path d="M450 390c-110-80-165-170-120-245 55-90 170-35 120 65 45-105 180-130 210-25 25 90-65 165-210 205z" fill="#22C55E"/><text x="318" y="150" font-size="62" fill="#FACC15" font-weight="900">2050</text>'};return '<div class="v"><svg viewBox="0 0 900 520"><defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#07132f"/><stop offset=".55" stop-color="#001E62"/><stop offset="1" stop-color="#004AA5"/></linearGradient></defs><rect width="900" height="520" rx="46" fill="url(#g)"/><circle cx="740" cy="118" r="94" fill="#FACC15" opacity=".92"/>'+(m[k]||m.basket)+'<text x="62" y="86" font-size="28" fill="#FACC15" font-weight="900">ANSWER VISUAL</text><text x="62" y="452" font-size="48" fill="#fff" font-weight="900">'+esc(title)+'</text><text x="64" y="493" font-size="26" fill="rgba(255,255,255,.86)" font-weight="700">'+esc(sub)+'</text></svg></div>'}
function boot(){try{var p=new URLSearchParams(location.search);var saved=lastRoom();if(p.get('room')){role='player';room=p.get('room').toUpperCase();base=makeBase(room);saveRoom();if(player.name)autoReconnectPlayer();else renderPlayerLogin()}else{renderHome();if(player.name&&saved){setTimeout(function(){var b=document.querySelector('[data-rejoin-last]');if(b)b.focus()},0)}}}catch(err){console.error(err);app.innerHTML='<main class="min-h-screen flex items-center justify-center p-5"><section class="panel rounded-[2rem] p-8 max-w-2xl w-full"><h1 class="text-3xl font-black mb-4 text-[#001E62]">ASV Quiz load error</h1><p class="font-bold text-slate-700 mb-4">'+esc(err&&err.message?err.message:err)+'</p><pre class="bg-slate-900 text-white rounded-2xl p-4 overflow-auto text-sm">'+esc(err&&err.stack?err.stack:err)+'</pre></section></main>'}}
function renderHome(){var savedHost=loadHostState();var savedRoom=lastRoom();app.innerHTML='<main class="min-h-screen flex items-center justify-center p-5"><section class="panel rounded-[2rem] p-8 md:p-12 text-center max-w-3xl w-full fade"><img src="'+LOGO+'" class="logo mx-auto mb-8"><h1 class="text-4xl md:text-6xl font-black mb-4 text-[#001E62]">ASV Quiz Party</h1><p class="text-slate-600 mb-6 font-bold">Host runs the quiz on a PC/projector. Participants answer from smartphones.</p>'+langSelect(false)+(savedHost?'<button data-action="resume-host" class="btn w-full rounded-3xl blue py-4 font-black text-xl shadow-xl mb-3">'+T('resumeHost')+'：'+esc(savedHost.room)+'</button>':'')+(savedRoom&&player.name?'<button data-action="rejoin" data-rejoin-last class="btn w-full rounded-3xl gold py-4 font-black text-xl shadow-xl mb-5">'+T('rejoin')+'：'+esc(savedRoom)+'</button>':'')+'<div class="grid md:grid-cols-2 gap-5"><button data-action="start-host" class="btn rounded-3xl blue p-8 font-black text-2xl shadow-2xl">'+icon('monitor','w-12 h-12')+'<br>Host</button><button data-action="manual-room" class="btn rounded-3xl gold p-8 font-black text-2xl shadow-2xl">'+icon('phone','w-12 h-12')+'<br>Participant</button></div></section></main>'}
function manualRoom(){app.innerHTML='<main class="min-h-screen flex items-center justify-center p-5"><section class="panel rounded-[2rem] p-7 text-center w-full max-w-md fade"><img src="'+LOGO+'" class="logo-sm mx-auto mb-6">'+langSelect(false)+'<h1 class="text-3xl font-black mb-3 text-[#001E62]">Room ID</h1><input id="manualRoom" maxlength="8" class="w-full text-center text-3xl tracking-[.18em] uppercase rounded-2xl p-5 text-[#001E62] font-black outline-none mb-5 border" placeholder="A7K29XYZ"><button data-action="go-room" class="btn w-full rounded-2xl gold py-5 font-black text-xl">'+T('enter')+'</button></section></main>'}
function goManualRoom(){var v=document.getElementById('manualRoom').value.trim().toUpperCase();if(v.length<5){toast('Please enter Room ID.');return}location.href=location.pathname+'?room='+encodeURIComponent(v)}
function resumeHost(){var s=loadHostState();if(!s||!s.room||!s.host){toast('No host session found.');renderHome();return}role='host';room=s.room;base=makeBase(room);host=s.host;host.connected=false;connect(function(){safeSubscribe(base+'/player');broadcast(true);if(host.phase==='lobby')renderHostLobby();else if(host.phase==='question'){renderHostQuestion();startHostTimer()}else if(host.phase==='result')renderHostResult();else if(host.phase==='final')renderHostFinal();else renderHostLobby()})}
function startHost(){clearHostState();disconnectClient();role='host';room=makeRoom();base=makeBase(room);host={phase:'lobby',players:{},qi:-1,answers:{},remain:QT,result:null,connected:false,endsAt:0};connect(function(){safeSubscribe(base+'/player');renderHostLobby();broadcast(true)})}
function hostShell(c){app.innerHTML='<main class="host"><header class="hh flex items-center justify-between mb-5"><img src="'+LOGO+'" class="logo"><div><div data-conn></div><p class="mt-1 text-slate-600 font-bold">Participants: '+all().length+'</p></div></header><div class="hc">'+c+'</div></main>';updateConn()}
function renderHostLobby(){host.phase='lobby';var u=joinURL();hostShell('<section class="grid lg:grid-cols-[400px_1fr] gap-6 h-full"><div class="panel rounded-[2rem] p-7 text-center"><h1 class="text-4xl font-black mb-5 text-[#001E62]">Waiting for Participants</h1><div id="qrcode" class="qr-box bg-white rounded-[2rem] p-4 inline-flex items-center justify-center mb-4 w-[300px] h-[300px] max-w-full border"></div><p class="text-sm font-bold break-all text-slate-500 mb-3">'+esc(u)+'</p><div class="rounded-3xl bg-[#F4F7FF] p-5 mb-6"><p class="text-slate-600 font-bold">Current Participants</p><p id="participantCount" class="text-7xl font-black text-[#001E62]">'+all().length+'</p></div><button data-action="start-game" class="btn pulse w-full rounded-3xl gold py-5 font-black text-3xl">'+icon('play','w-8 h-8')+' Start Game</button></div><div class="panel rounded-[2rem] p-7"><h2 class="text-3xl font-black mb-5 text-[#001E62]">Participant List</h2><div id="participantList" class="grid md:grid-cols-2 xl:grid-cols-3 gap-4"></div></div></section>');var el=document.getElementById('qrcode');if(el&&window.QRCode)new QRCode(el,{text:u,width:280,height:280,colorDark:'#001E62',colorLight:'#fff'});else if(el)el.innerHTML='<b>QR library failed to load.<br>Please share Room ID.</b>';updateLobbyParticipants()}
function updateLobbyParticipants(){var c=document.getElementById('participantCount');if(c)c.textContent=all().length;var l=document.getElementById('participantList');if(!l)return;l.innerHTML=all().length?all().map(function(p){return '<div class="rounded-2xl bg-[#F4F7FF] p-4 font-bold flex justify-between text-[#001E62]"><span>'+esc(p.name)+'</span><span class="'+(p.pending?'text-amber-600':'text-green-600')+'">'+(p.pending?T('pending'):'Waiting')+'</span></div>'}).join(''):'<p class="text-slate-600 text-xl font-bold">Please scan the QR code to join.</p>'}
function handleJoin(d){if(!d||typeof d.id!=='string')return;var old=host.players[d.id]||{};var pending=host.phase!=='lobby'&&old.pending!==false;host.players[d.id]={id:d.id.slice(0,80),name:String(d.name||'ゲスト').slice(0,10),score:old.score||0,wrong:old.wrong||0,eliminated:!!old.eliminated,pending:pending};if(host.phase==='lobby')updateLobbyParticipants();broadcast(false)}
function isValidAnswerMessage(d){return d&&d.type==='answer'&&typeof d.id==='string'&&d.id.length<=80&&Number.isInteger(d.answer)&&d.answer>=0&&d.answer<4&&d.roomId===room&&d.qi===host.qi}
function onHost(d){if(d.type==='join'){handleJoin(d);return}if(d.type==='answer'){if(!isValidAnswerMessage(d))return;if(host.phase!=='question'||Date.now()>=host.endsAt)return;var p=host.players[d.id];if(!p||p.eliminated||p.pending||host.answers[d.id]!==undefined)return;host.answers[d.id]=d.answer;updateHostLive();broadcast(false);if(Object.keys(host.answers).length>=activePlayers().length)finishQuestion()}}
function state(){var remain=host.phase==='question'?Math.max(0,Math.ceil((host.endsAt-Date.now())/1000)):host.remain;return {type:'state',phase:host.phase,roomId:room,serverNow:Date.now(),questionIndex:host.qi,totalQuestions:Q.length,question:host.phase==='question'?{time:QT,endsAt:host.endsAt,remain:remain}:null,result:host.result,players:host.players,ranking:ranks(),answeredIds:Object.keys(host.answers)}}
function broadcast(forceSave){saveHostState(!!forceSave);pub(base+'/host',state(),{qos:0})}
function startGame(){if(!all().length){toast('No participants have joined yet.');return}nextQuestion()}
function nextQuestion(){all().forEach(function(p){if(!p.eliminated)p.pending=false});if(host.qi>=Q.length-1){host.phase='final';renderHostFinal();broadcast(true);return}host.qi++;host.phase='question';host.answers={};host.result=null;host.remain=QT;host.endsAt=Date.now()+QT*1000;renderHostQuestion();broadcast(true);startHostTimer()}
function startHostTimer(){clearInterval(hostTimer);cancelAnimationFrame(hostRAF);hostTimer=setInterval(function(){host.remain=Math.max(0,Math.ceil((host.endsAt-Date.now())/1000));updateHostLive();if(host.remain<=0)finishQuestion()},250);animate('hBar',host.endsAt,QT,function(v){hostRAF=v})}
function animate(id,ends,total,setter){function tick(){var left=Math.max(0,(ends-Date.now())/(total*1000));var b=document.getElementById(id);if(b){b.style.transform='scaleX('+left+')';b.style.background=left<=.25?'#EF4444':'linear-gradient(90deg,#001E62,#3B82F6)'}if(left>0)setter(requestAnimationFrame(tick))}tick()}
function renderHostQuestion(){var q=Q[host.qi];hostShell('<section class="panel rounded-[2rem] p-7 h-full"><div class="grid lg:grid-cols-[1fr_230px] gap-5 mb-5"><p class="text-[#001E62] font-black text-2xl">Question '+(host.qi+1)+' / '+Q.length+'</p><div class="text-center rounded-[2rem] bg-white text-[#001E62] border px-8 py-4"><p class="font-bold">Time Left</p><p id="hTime" class="text-5xl font-black">'+host.remain+'</p></div></div><div class="barwrap h-4 bg-slate-200 rounded-full mb-6"><div id="hBar" class="bar"></div></div><div class="grid xl:grid-cols-[1fr_330px] gap-6"><div><h1 class="text-4xl md:text-5xl font-black leading-tight mb-7">'+esc(qText(q))+'</h1><div class="grid md:grid-cols-2 gap-4">'+opts(q).map(function(op,i){return '<div class="rounded-3xl bg-[#F4F7FF] text-[#001E62] p-5 text-2xl font-black flex gap-4"><span class="rounded-full bg-[#001E62] text-white w-12 h-12 flex items-center justify-center shrink-0">'+optionLabel(i)+'</span>'+esc(op)+'</div>'}).join('')+'</div></div><aside><div class="rounded-3xl bg-[#F4F7FF] p-7"><p class="text-slate-600 font-bold">Answers</p><p class="text-6xl font-black text-[#001E62]"><span id="hAnswered">0</span> / <span id="hAlive">'+activePlayers().length+'</span></p></div></aside></div></section>');updateHostLive()}
function updateHostLive(){var a=Object.keys(host.answers).length;var ht=document.getElementById('hTime'),ha=document.getElementById('hAnswered'),hl=document.getElementById('hAlive');if(ht)ht.textContent=host.remain;if(ha)ha.textContent=a;if(hl)hl.textContent=activePlayers().length}
function finishQuestion(){if(host.phase!=='question')return;clearInterval(hostTimer);cancelAnimationFrame(hostRAF);var q=Q[host.qi],counts=[0,0,0,0],voters=[[],[],[],[]];Object.entries(host.answers).forEach(function(ent){var id=ent[0],a=ent[1];if(a>=0&&a<4){counts[a]++;if(host.players[id])voters[a].push(host.players[id].name)}});activePlayers().forEach(function(p){var ok=host.answers[p.id]===q.c;p.lastCorrect=ok;if(ok)p.score+=100;else{p.wrong++;if(p.wrong>=MAX_WRONG)p.eliminated=true}});host.phase='result';host.result={questionIndex:host.qi,questionText:qText(q),options:opts(q),correct:q.c,correctText:opts(q)[q.c],counts:counts,voters:voters,explain:expText(q),title:aText(q),sub:subText(q),kind:q.k};renderHostResult();broadcast(true)}
function renderHostResult(){var r=host.result;hostShell('<section class="grid xl:grid-cols-[1.05fr_.95fr] gap-6 h-full"><div class="panel rounded-[2rem] p-6"><p class="text-[#001E62] font-black text-2xl mb-2">Correct Answer</p><h1 class="text-3xl font-black mb-4">'+esc(r.questionText)+'</h1><div class="bg-white rounded-[2rem] p-4 border" style="height:40vh"><canvas id="chart"></canvas></div><div class="grid grid-cols-2 gap-4 mt-4"><div class="rounded-2xl bg-[#F4F7FF] p-4"><p class="font-bold text-slate-600">Remaining Players</p><p class="text-4xl font-black text-[#001E62]">'+activePlayers().length+'</p></div><div class="rounded-2xl bg-[#F4F7FF] p-4"><p class="font-bold text-slate-600">Eliminated Players</p><p class="text-4xl font-black text-[#001E62]">'+all().filter(function(p){return p.eliminated}).length+'</p></div></div></div><div class="panel rounded-[2rem] p-6 flex flex-col"><div class="rounded-[2rem] gold p-5 mb-4"><p class="text-4xl font-black">'+optionLabel(r.correct)+'</p><p class="text-2xl font-black">'+esc(r.correctText)+'</p></div>'+visual(r.kind,r.title,r.sub)+'<div class="rounded-3xl bg-[#F4F7FF] p-4 my-4"><p class="text-[#001E62] font-black">Explanation</p><p class="font-bold text-slate-700">'+esc(r.explain)+'</p></div><button data-action="next-question" class="btn mt-auto rounded-3xl blue py-4 font-black text-2xl">'+(host.qi>=Q.length-1?'Ranking':'Next Question')+'</button></div></section>');setTimeout(drawChart,0)}
function drawChart(){var r=host.result,c=document.getElementById('chart');if(!c)return;if(!window.Chart){c.parentElement.innerHTML='<div class="p-6 text-center font-bold text-slate-600">Chart library failed to load.</div>';return}if(chart)chart.destroy();chart=new Chart(c,{type:'bar',data:{labels:r.options.map(function(o,i){return optionLabel(i)+'. '+o}),datasets:[{data:r.counts,backgroundColor:r.options.map(function(_,i){return i===r.correct?'#FACC15':'#001E62'}),borderRadius:12}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:function(ctx){var n=r.voters[ctx.dataIndex]||[];return n.length?'Selected by: '+n.join(', '):'Selected by: none'}}}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}})}
function renderHostFinal(){hostShell('<section class="panel rounded-[2rem] p-10 text-center h-full"><div class="text-yellow-500 mb-4">'+icon('trophy','w-20 h-20')+'</div><h1 class="text-6xl font-black mb-8 text-[#001E62]">Ranking</h1><div class="max-w-4xl mx-auto space-y-3">'+ranks().map(function(p,i){return '<div class="rounded-[2rem] '+(i===0?'rank1':'rankN')+' p-5 flex justify-between shadow border"><b class="text-2xl">'+(i+1)+'. '+esc(p.name)+'</b><b class="text-4xl">'+p.score+'</b></div>'}).join('')+'</div></section>')}
function subscribeAndJoin(after){saveRoom();var join=function(){safeSubscribe(base+'/host');pub(base+'/player',{type:'join',id:player.id,name:player.name,roomId:room});if(after)after()};if(client&&client.connected)join();else connect(join)}
function autoReconnectPlayer(){if(!player.name){renderPlayerLogin();return}renderPlayerWaiting(T('reconnecting'));subscribeAndJoin(function(){renderPlayerWaiting(T('joined'))})}
function changePlayerLang(){if(lastPlayerState){onPlayer(lastPlayerState);return}if(role==='player'&&room){if(player.name)renderPlayerWaiting(T('joined'));else renderPlayerLogin();return}manualRoom()}
function renderPlayerLogin(){playerViewKey='login';app.innerHTML='<main class="min-h-screen flex items-center justify-center p-5 safe"><section class="panel rounded-[2rem] p-7 text-center w-full max-w-md"><img src="'+LOGO+'" class="logo-sm mx-auto mb-6">'+langSelect(false)+'<p class="text-[#001E62] font-black text-xl mb-1">Room ID：'+esc(room)+'</p><h1 class="text-3xl font-black mb-3 text-[#001E62]">'+T('name')+'</h1><input id="nickname" maxlength="10" value="'+esc(player.name)+'" class="w-full rounded-2xl p-5 text-[#001E62] font-black text-2xl text-center outline-none mb-5 border" placeholder="お名前"><button id="joinBtn" class="btn w-full rounded-2xl gold py-5 font-black text-xl">'+T('enter')+'</button><p id="msg" class="mt-5 text-slate-600 text-sm"></p></section></main>';document.getElementById('joinBtn').onclick=joinPlayer}
function joinPlayer(){var n=document.getElementById('nickname').value.trim().slice(0,10);if(!n){document.getElementById('msg').textContent='Please enter your nickname.';return}player.name=n;savePlayerIdentity();subscribeAndJoin(function(){renderPlayerWaiting(T('joined'))})}
function onPlayer(d){if(d.type!=='state'||d.roomId!==room)return;lastPlayerState=d;if(typeof d.serverNow==='number')timeOffset=d.serverNow-Date.now();var me=d.players&&d.players[player.id];if(me){player.score=me.score;player.wrong=me.wrong;player.eliminated=me.eliminated}if(player.eliminated&&d.phase!=='final'){if(playerViewKey!=='eliminated'){playerViewKey='eliminated';renderPlayerEliminated()}return}if(d.phase==='lobby'){if(playerViewKey!=='lobby'){playerViewKey='lobby';renderPlayerWaiting(T('joined'))}return}if(d.phase==='question'){var newQ=player.lastQi!==d.questionIndex;if(newQ){player.selected=null;player.locked=false;player.lastQi=d.questionIndex;playerViewKey=''}if(d.answeredIds&&d.answeredIds.includes(player.id))player.locked=true;if(playerViewKey!=='q'+d.questionIndex){renderPlayerQuestion(d);playerViewKey='q'+d.questionIndex}syncPlayerQuestionFromHost(d);return}if(d.phase==='result'){var key='r'+(d.result&&d.result.questionIndex);if(playerViewKey!==key){playerViewKey=key;renderPlayerResult(d,me)}return}if(d.phase==='final'){if(playerViewKey!=='final'){playerViewKey='final';renderPlayerFinal(d)}return}}
function playerShell(c,dark){app.innerHTML='<main id="playerMain" class="min-h-screen p-4 safe '+(dark?'!bg-red-900':'')+'"><header class="flex items-center justify-between mb-4"><img src="'+LOGO+'" class="logo-sm">'+langSelect(true)+'</header>'+c+'</main>'}
function renderPlayerWaiting(msg){playerViewKey='waiting';playerShell('<section class="panel rounded-[2rem] p-7 text-center min-h-[72vh] flex flex-col justify-center"><h1 class="text-3xl font-black mb-4 text-[#001E62]">'+T('wait')+'</h1><p class="text-slate-600 text-lg font-bold">'+esc(msg)+'</p><div class="mt-8 rounded-2xl bg-[#F4F7FF] p-5"><p class="font-bold text-slate-600">Your name</p><p class="text-3xl font-black text-[#001E62]">'+esc(player.name)+'</p></div></section>',false)}
function renderPlayerQuestion(d){var q=Q[d.questionIndex];playerShell('<section><div class="panel rounded-[2rem] p-5 mb-4"><div class="flex justify-between mb-3"><p class="text-[#001E62] font-black">Question '+(d.questionIndex+1)+' / '+Q.length+'</p><div class="rounded-2xl bg-white text-[#001E62] px-4 py-2 border text-center"><p class="text-xs font-bold">'+T('left')+'</p><p id="pTime" class="text-3xl font-black">'+getSyncedLeft(d.question)+'</p></div></div><div class="barwrap h-3 bg-slate-200 rounded-full mb-4"><div id="pBar" class="bar"></div></div><h1 class="text-xl font-black">'+esc(qText(q))+'</h1></div><div class="space-y-3">'+opts(q).map(function(op,i){return '<button '+(player.locked?'disabled':'')+' data-action="answer" data-answer="'+i+'" class="opt btn w-full rounded-3xl p-5 text-left font-black text-lg shadow-xl '+(player.selected===i?'gold':'bg-white text-[#001E62]')+'"><span class="inline-flex mr-4 w-11 h-11 rounded-full bg-[#001E62] text-white items-center justify-center">'+optionLabel(i)+'</span>'+esc(op)+'</button>'}).join('')+'</div><div class="mt-4 panel rounded-2xl p-4 text-center"><p id="sendMsg" class="font-black text-slate-600">'+(player.locked?T('sent'):T('choose'))+'</p><p class="mt-2 text-sm text-slate-600 font-bold">'+T('wrongCount')+'：'+player.wrong+' / '+MAX_WRONG+'</p></div></section>',false)}
function getSyncedLeft(q){if(!q)return 0;return Math.max(0,Math.ceil((q.endsAt-(Date.now()+timeOffset))/1000))}
function syncPlayerQuestionFromHost(d){if(!d||!d.question)return;var total=d.question.time||QT,left=getSyncedLeft(d.question);var t=document.getElementById('pTime');if(t)t.textContent=left;var b=document.getElementById('pBar');if(b){var ratio=Math.max(0,Math.min(1,left/total));b.style.transform='scaleX('+ratio+')';b.style.background=ratio<=.25?'#EF4444':'linear-gradient(90deg,#001E62,#3B82F6)'}if(d.answeredIds&&d.answeredIds.includes(player.id))player.locked=true;if(left<=0||player.locked){document.querySelectorAll('button[data-action="answer"]').forEach(function(btn){btn.disabled=true;if(left<=0)btn.classList.add('opacity-45')});var m=document.getElementById('sendMsg');if(m)m.textContent=player.locked?T('sent'):T('timeup')}cancelAnimationFrame(playerRAF);if(left>0&&!player.locked)playerRAF=requestAnimationFrame(function(){syncPlayerQuestionFromHost(d)})}
function vibrate(p){try{if(navigator.vibrate)return navigator.vibrate(p)}catch(e){}}
function sendAnswer(i){if(player.locked)return;if(!Number.isInteger(i)||i<0||i>3)return;if(lastPlayerState&&lastPlayerState.question&&getSyncedLeft(lastPlayerState.question)<=0){player.locked=true;var mm=document.getElementById('sendMsg');if(mm)mm.textContent=T('timeup');return}var ok=pub(base+'/player',{type:'answer',id:player.id,answer:i,roomId:room,qi:player.lastQi});if(!ok){var m=document.getElementById('sendMsg');if(m)m.textContent=T('sendFail');return}vibrate(8);player.selected=i;player.locked=true;document.querySelectorAll('button[data-action="answer"]').forEach(function(b,idx){b.disabled=true;if(idx===i)b.className=b.className.replace('bg-white text-[#001E62]','gold');else b.classList.add('opacity-45')});var sm=document.getElementById('sendMsg');if(sm)sm.textContent=T('sent')}
function renderPlayerResult(d,me){cancelAnimationFrame(playerRAF);var idx=d.result.questionIndex==null?player.lastQi:d.result.questionIndex;var q=Q[idx];var ok=me&&me.lastCorrect===true;if(!ok){vibrate([220,80,220,80,320]);setTimeout(function(){var e=document.getElementById('playerMain');if(e)e.classList.add('shake')},30)}playerShell('<section class="panel rounded-[2rem] p-5 text-center"><div class="'+(ok?'text-green-500':'text-red-500')+' mb-4">'+icon(ok?'check':'x','w-20 h-20')+'</div><h1 class="text-4xl font-black '+(ok?'text-green-600':'text-red-600')+' mb-4">'+(ok?T('right'):T('wrong'))+'</h1><div class="rounded-3xl gold p-5 mb-4"><p class="font-bold">'+T('correct')+'</p><p class="text-2xl font-black">'+optionLabel(q.c)+'. '+esc(opts(q)[q.c])+'</p></div>'+visual(q.k,aText(q),subText(q))+'<div class="rounded-3xl bg-[#F4F7FF] p-4 my-4 text-left"><p class="text-[#001E62] font-black">'+T('exp')+'</p><p class="font-bold text-slate-700">'+esc(expText(q))+'</p></div><div class="rounded-3xl bg-[#F4F7FF] p-4"><p class="font-bold text-slate-600">'+T('wrongCount')+'</p><p class="text-5xl font-black text-[#001E62]">'+player.wrong+' / '+MAX_WRONG+'</p></div><p class="mt-4 text-slate-600 font-bold">'+T('next')+'</p></section>',false)}
function renderPlayerEliminated(){playerShell('<section class="rounded-[2rem] bg-red-700/90 p-8 text-center min-h-[78vh] flex flex-col justify-center text-white"><h1 class="text-6xl font-black mb-4">'+(lang()==='zh'?'淘汰':lang()==='en'?'Eliminated':'脱落')+'</h1><p class="text-xl font-bold">'+T('wrongCount')+' '+player.wrong+' / '+MAX_WRONG+'</p></section>',true)}
function renderPlayerFinal(d){cancelAnimationFrame(playerRAF);var rk=d.ranking||[];playerShell('<section class="panel rounded-[2rem] p-6 text-center"><h1 class="text-4xl font-black mb-6 text-[#001E62]">'+T('done')+'</h1><div class="rounded-3xl gold p-6 mb-6"><p class="font-bold">'+T('score')+'</p><p class="text-6xl font-black">'+player.score+'</p></div><div class="space-y-3">'+rk.map(function(p,i){return '<div class="rounded-2xl bg-[#F4F7FF] p-4 flex justify-between"><b>'+(i+1)+'. '+esc(p.name)+'</b><b>'+p.score+'</b></div>'}).join('')+'</div></section>',false)}
document.addEventListener('click',function(e){var el=e.target.closest('[data-action]');if(!el)return;var a=el.dataset.action;if(a==='start-host')startHost();else if(a==='manual-room')manualRoom();else if(a==='go-room')goManualRoom();else if(a==='resume-host')resumeHost();else if(a==='start-game')startGame();else if(a==='next-question')nextQuestion();else if(a==='answer')sendAnswer(Number(el.dataset.answer));else if(a==='rejoin')location.href=location.pathname+'?room='+encodeURIComponent(lastRoom())});
document.addEventListener('change',function(e){var el=e.target;if(el.matches('[data-lang]')){setLang(el.value);if(role==='player')changePlayerLang();else renderHome()}});
if(document.readyState==='loading')window.addEventListener('DOMContentLoaded',boot);else boot();
</script>
</body>
</html>
