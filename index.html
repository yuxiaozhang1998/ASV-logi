{t:{ja:'ASICSが展開する「OneASICS」の会員数は？',zh:'ASICS 推出的「OneASICS」會員人數是？',en:'How many members does ASICS’ “OneASICS” program have?'},o:{ja:['1400万人','1800万人','2300万人','2800万人'],zh:['1,400 萬人','1,800 萬人','2,300 萬人','2,800 萬人'],en:['14 million','18 million','23 million','28 million']},c:2,k:'members',a:{ja:'2300万人',zh:'2,300 萬人',en:'23 million'},s:{ja:'OneASICS会員数',zh:'OneASICS 會員人數',en:'OneASICS membership'},e:{ja:'2025年時点、2313万人、24年対比31％の増加。レース登録会社を通じて、グローバルでデジタルを活用したアシックスならではのランニング体験を提供し、ブランド体験価値向上を図る。',zh:'截至 2025 年，會員人數為 2,313 萬人，較 2024 年增加 31%。ASICS 透過賽事報名公司，在全球運用數位技術提供 ASICS 獨有的跑步體驗，提升品牌體驗價值。',en:'As of 2025, membership was 23.13 million, a 31% increase compared with 2024. Through race registration companies, ASICS aims to use digital tools globally to provide running experiences unique to ASICS and enhance the value of the brand experience.'}},

{t:{ja:'サプライチェーン管理において「JIT」が意味するものはどれ？',zh:'在供應鏈管理中，「JIT」代表哪一項？',en:'In supply chain management, what does “JIT” mean?'},o:{ja:['Just in Time','Joint Inventory Tracking','Japanese Import Tariff','Just in Transit'],zh:['Just in Time','Joint Inventory Tracking','Japanese Import Tariff','Just in Transit'],en:['Just in Time','Joint Inventory Tracking','Japanese Import Tariff','Just in Transit']},c:0,k:'jit',a:{ja:'Just in Time',zh:'Just in Time',en:'Just in Time'},s:{ja:'JITの意味',zh:'JIT 的意思',en:'Meaning of JIT'},e:{ja:'JIT（ジャスト・イン・タイム）は必要なものを、必要なときに、必要な量だけ供給する概念です。在庫コストの削減や効率化に貢献します。',zh:'JIT（Just in Time，準時化）是指在需要的時間，供應需要的物品與需要的數量。它有助於降低庫存成本並提升效率。',en:'JIT (Just in Time) is the concept of supplying what is needed, when it is needed, and in the quantity needed. It helps reduce inventory costs and improve efficiency.'}},

function connect(cb){if(!window.mqtt){toast(L('mqttFail'));return}if(client&&client.connected){cb&&cb();return}if(client)disconnectClient();client=mqtt.connect(BROKER,{clientId:`quiz_${role}_${Math.random().toString(36).slice(2,10)}`,clean:true,reconnectPeriod:2000,connectTimeout:8000});client.on('connect',()=>{if(role==='host')host.connected=true;else player.connected=true;cb&&cb();updateConn()});client.on('close',()=>{if(role==='host')host.connected=false;else player.connected=false;updateConn()});client.on('message',(t,m)=>{let d;try{d=JSON.parse(m.toString())}catch{return}role==='host'?onHost(d):onPlayer(d)})}

t="700">${esc(sub)}</text></svg></div>`}
function boot(){try{setLang(lang());const p=new URLSearchParams(location.search);const saved=lastRoom();if(p.get('room')){role='player';room=p.get('room').toUpperCase();base=makeBase(room);saveRoom();player.name?autoReconnectPlayer():renderPlayerLogin()}else{renderHome();if(player.name&&saved){setTimeout(()=>{const b=document.querySelector('[data-rejoin-last]');if(b)b.focus()},0)}}}catch(err){console.error(err);app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5"><section class="panel rounded-[2rem] p-8 max-w-2xl w-full"><h1 class="text-3xl font-black mb-4 text-[#001E62]">${L('loadError')}</h1><p class="font-bold text-slate-700 mb-4">${esc(err&&err.message?err.message:err)}</p><pre class="bg-slate-900 text-white rounded-2xl p-4 overflow-auto text-sm">${esc(err&&err.stack?err.stack:err)}</pre></section></main>`}}
function renderHome(){const savedHost=loadHostState(),savedRoom=lastRoom();app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5"><section class="panel rounded-[2rem] p-8 md:p-12 text-center max-w-3xl w-full fade"><img src="${LOGO}" class="logo mx-auto mb-8"><h1 class="text-4xl md:text-6xl font-black mb-4 text-[#001E62]">ASV Quiz Party</h1><p class="text-slate-600 mb-6 font-bold">${L('hostIntro')}</p>${langSelect()}${savedHost?`<button data-action="resume-host" class="btn w-full rounded-3xl blue py-4 font-black text-xl shadow-xl mb-3">${L('resume')}：${esc(savedHost.room)}</button>`:''}${savedRoom&&player.name?`<button data-action="rejoin" data-rejoin-last class="btn w-full rounded-3xl gold py-4 font-black text-xl shadow-xl mb-5">${L('rejoin')}：${esc(savedRoom)}</button>`:''}<div class="grid md:grid-cols-2 gap-5"><button data-action="start-host" class="btn rounded-3xl blue p-8 font-black text-2xl shadow-2xl">${icon('monitor','w-12 h-12')}<br>Host</button><button data-action="manual-room" class="btn rounded-3xl gold p-8 font-black text-2xl shadow-2xl">${icon('phone','w-12 h-12')}<br>${L('participant')}</button></div></section></main>`}
function manualRoom(){app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5"><section class="panel rounded-[2rem] p-7 text-center w-full max-w-md fade"><img src="${LOGO}" class="logo-sm mx-auto mb-6">${langSelect()}<h1 class="text-3xl font-black mb-3 text-[#001E62]">${L('manualRoom')}</h1><input id="manualRoom" maxlength="8" class="w-full text-center text-3xl tracking-[.18em] uppercase rounded-2xl p-5 text-[#001E62] font-black outline-none mb-5 border" placeholder="A7K29XYZ"><button data-action="go-room" class="btn w-full rounded-2xl gold py-5 font-black text-xl">${L('enter')}</button></section></main>`}
function goManualRoom(){const v=document.getElementById('manualRoom').value.trim().toUpperCase();if(v.length<5){toast(L('roomRequired'));return}location.href=`${location.pathname}?room=${encodeURIComponent(v)}`}
function startHost(){clearHostState();disconnectClient();role='host';room=makeRoom();base=makeBase(room);host={phase:'lobby',players:{},qi:-1,answers:{},remain:QT,result:null,connected:false,endsAt:0};connect(()=>{safeSubscribe(`${base}/player`);renderHostLobby();broadcast(true)})}
function resumeHost(){const s=loadHostState();if(!s||!s.room||!s.host){toast(L('hostRestoreFail'));renderHome();return}role='host';room=s.room;base=makeBase(room);host=s.host;host.connected=false;connect(()=>{safeSubscribe(`${base}/player`);broadcast(true);if(host.phase==='lobby')renderHostLobby();else if(host.phase==='question'){renderHostQuestion();startHostTimer()}else if(host.phase==='result')renderHostResult();else if(host.phase==='final')renderHostFinal();else renderHostLobby()})}
function hostShell(c){app.innerHTML=`<main class="host"><header class="hh flex items-center justify-between mb-5"><img src="${LOGO}" class="logo"><div><div data-conn></div><p class="mt-1 text-slate-600 font-bold">${L('participant')}：${all().length}</p></div></header><div class="hc">${c}</div></main>`;updateConn()}
function renderHostLobby(){host.phase='lobby';const u=joinURL();hostShell(`<section class="grid lg:grid-cols-[400px_1fr] gap-6 h-full"><div class="panel rounded-[2rem] p-7 text-center"><h1 class="text-4xl font-black mb-5 text-[#001E62]">${L('waitingParticipants')}</h1><div id="qrcode" class="qr-box bg-white rounded-[2rem] p-4 inline-flex items-center justify-center mb-4 w-[300px] h-[300px] max-w-full border"></div><p class="text-sm font-bold break-all text-slate-500 mb-3">${esc(u)}</p><div class="rounded-3xl bg-[#F4F7FF] p-5 mb-6"><p class="text-slate-600 font-bold">${L('currentParticipants')}</p><p id="participantCount" class="text-7xl font-black text-[#001E62]">${all().length}</p></div><button data-action="start-game" class="btn pulse w-full rounded-3xl gold py-5 font-black text-3xl">${icon('play','w-8 h-8')} ${L('startGame')}</button></div><div class="panel rounded-[2rem] p-7"><h2 class="text-3xl font-black mb-5 text-[#001E62]">${L('participantList')}</h2><div id="participantList" class="grid md:grid-cols-2 xl:grid-cols-3 gap-4"></div></div></section>`);const el=document.getElementById('qrcode');if(el&&window.QRCode)new QRCode(el,{text:u,width:280,height:280,colorDark:'#001E62',colorLight:'#fff'});else if(el)el.innerHTML='<b>'+L('qrFail')+'</b>';updateLobbyParticipants()}
function updateLobbyParticipants(){const c=document.getElementById('participantCount');if(c)c.textContent=all().length;const l=document.getElementById('participantList');if(!l)return;l.innerHTML=all().length?all().map(p=>`<div class="rounded-2xl bg-[#F4F7FF] p-4 font-bold flex justify-between text-[#001E62]"><span>${esc(p.name)}</span><span class="${p.pending?'text-amber-600':'text-green-600'}">${p.pending?L('pending'):L('wait')}</span></div>`).join(''):`<p class="text-slate-600 text-xl font-bold">${L('scanQr')}</p>`}
function handleJoin(d){if(!d||typeof d.id!=='string')return;const old=host.players[d.id]||{};const pending=host.phase!=='lobby'&&old.pending!==false;host.players[d.id]={id:d.id.slice(0,80),name:String(d.name||'Guest').slice(0,10),score:old.score||0,wrong:old.wrong||0,eliminated:!!old.eliminated,pending};if(host.phase==='lobby')updateLobbyParticipants();broadcast(false)}
function isValidAnswerMessage(d){return d&&d.type==='answer'&&typeof d.id==='string'&&d.id.length<=80&&Number.isInteger(d.answer)&&d.answer>=0&&d.answer<4&&d.roomId===room&&d.qi===host.qi}
function onHost(d){if(d.type==='join'){handleJoin(d);return}if(d.type==='answer'){if(!isValidAnswerMessage(d))return;if(host.phase!=='question'||Date.now()>=host.endsAt)return;const p=host.players[d.id];if(!p||p.eliminated||p.pending||host.answers[d.id]!==undefined)return;host.answers[d.id]=d.answer;updateHostLive();broadcast(false);if(Object.keys(host.answers).length>=activePlayers().length)finishQuestion()}}
function state(){const remain=host.phase==='question'?Math.max(0,Math.ceil((host.endsAt-Date.now())/1000)):host.remain;return{type:'state',phase:host.phase,roomId:room,serverNow:Date.now(),questionIndex:host.qi,totalQuestions:Q.length,question:host.phase==='question'?{time:QT,endsAt:host.endsAt,remain}:null,result:host.result,players:host.players,ranking:ranks(),answeredIds:Object.keys(host.answers)}}
function broadcast(forceSave=false){saveHostState(forceSave);pub(`${base}/host`,state(),{qos:0})}
function startGame(){if(!all().length){toast(L('noParticipants'));return}nextQuestion()}
function nextQuestion(){all().forEach(p=>{if(!p.eliminated)p.pending=false});if(host.qi>=Q.length-1){host.phase='final';renderHostFinal();broadcast(true);return}host.qi++;host.phase='question';host.answers={};host.result=null;host.remain=QT;host.endsAt=Date.now()+QT*1000;renderHostQuestion();broadcast(true);startHostTimer()}
function startHostTimer(){clearInterval(hostTimer);cancelAnimationFrame(hostRAF);hostTimer=setInterval(()=>{host.remain=Math.max(0,Math.ceil((host.endsAt-Date.now())/1000));updateHostLive();if(host.remain<=0)finishQuestion()},250);animate('hBar',host.endsAt,QT,v=>hostRAF=v)}
function animate(id,ends,total,setter){function tick(){const left=Math.max(0,(ends-Date.now())/(total*1000));const b=document.getElementById(id);if(b){b.style.transform=`scaleX(${left})`;b.style.background=left<=.25?'#EF4444':'linear-gradient(90deg,#001E62,#3B82F6)'}if(left>0)setter(requestAnimationFrame(tick))}tick()}
function renderHostQuestion(){const q=Q[host.qi];hostShell(`<section class="panel rounded-[2rem] p-7 h-full"><div class="grid lg:grid-cols-[1fr_230px] gap-5 mb-5"><p class="text-[#001E62] font-black text-2xl">${L('question')} ${host.qi+1} / ${Q.length}</p><div class="text-center rounded-[2rem] bg-white text-[#001E62] border px-8 py-4"><p class="font-bold">${L('left')}</p><p id="hTime" class="text-5xl font-black">${host.remain}</p></div></div><div class="barwrap h-4 bg-slate-200 rounded-full mb-6"><div id="hBar" class="bar"></div></div><div class="grid xl:grid-cols-[1fr_330px] gap-6"><div><h1 class="text-4xl md:text-5xl font-black leading-tight mb-7">${esc(qText(q))}</h1><div class="grid md:grid-cols-2 gap-4">${opts(q).map((op,i)=>`<div class="rounded-3xl bg-[#F4F7FF] text-[#001E62] p-5 text-2xl font-black flex gap-4"><span class="rounded-full bg-[#001E62] text-white w-12 h-12 flex items-center justify-center shrink-0">${optionLabel(i)}</span>${esc(op)}</div>`).join('')}</div></div><aside><div class="rounded-3xl bg-[#F4F7FF] p-7"><p class="text-slate-600 font-bold">${L('answers')}</p><p class="text-6xl font-black text-[#001E62]"><span id="hAnswered">0</span> / <span id="hAlive">${activePlayers().length}</span></p></div></aside></div></section>`);updateHostLive()}
function updateHostLive(){const a=Object.keys(host.answers).length;const ht=document.getElementById('hTime'),ha=document.getElementById('hAnswered'),hl=document.getElementById('hAlive');if(ht)ht.textContent=host.remain;if(ha)ha.textContent=a;if(hl)hl.textContent=activePlayers().length}
function finishQuestion(){if(host.phase!=='question')return;clearInterval(hostTimer);cancelAnimationFrame(hostRAF);const q=Q[host.qi],counts=[0,0,0,0],voters=[[],[],[],[]];Object.entries(host.answers).forEach(([id,a])=>{if(a>=0&&a<4){counts[a]++;if(host.players[id])voters[a].push(host.players[id].name)}});activePlayers().forEach(p=>{const ok=host.answers[p.id]===q.c;p.lastCorrect=ok;if(ok)p.score+=100;else{p.wrong++;if(p.wrong>=MAX_WRONG)p.eliminated=true}});host.phase='result';host.result={questionIndex:host.qi,correct:q.c,counts,voters,kind:q.k};renderHostResult();broadcast(true)}
function renderHostResult(){const r=host.result,q=Q[r.questionIndex];hostShell(`<section class="grid xl:grid-cols-[1.05fr_.95fr] gap-6 h-full"><div class="panel rounded-[2rem] p-6"><p class="text-[#001E62] font-black text-2xl mb-2">${L('correctAnnounce')}</p><h1 class="text-3xl font-black mb-4">${esc(qText(q))}</h1><div class="bg-white rounded-[2rem] p-4 border" style="height:40vh"><canvas id="chart"></canvas></div><div class="grid grid-cols-2 gap-4 mt-4"><div class="rounded-2xl bg-[#F4F7FF] p-4"><p class="font-bold text-slate-600">${L('remainingPlayers')}</p><p class="text-4xl font-black text-[#001E62]">${activePlayers().length}</p></div><div class="rounded-2xl bg-[#F4F7FF] p-4"><p class="font-bold text-slate-600">${L('eliminatedPlayers')}</p><p class="text-4xl font-black text-[#001E62]">${all().filter(p=>p.eliminated).length}</p></div></div></div><div class="panel rounded-[2rem] p-6 flex flex-col"><div class="rounded-[2rem] gold p-5 mb-4"><p class="text-4xl font-black">${optionLabel(q.c)}</p><p class="text-2xl font-black">${esc(opts(q)[q.c])}</p></div>${visual(q.k,aText(q),subText(q))}<div class="rounded-3xl bg-[#F4F7FF] p-4 my-4"><p class="text-[#001E62] font-black">${L('exp')}</p><p class="font-bold text-slate-700">${esc(expText(q))}</p></div><button data-action="next-question" class="btn mt-auto rounded-3xl blue py-4 font-black text-2xl">${host.qi>=Q.length-1?L('goRanking'):L('nextQuestion')}</button></div></section>`);setTimeout(drawChart,0)}
function drawChart(){const r=host.result,q=Q[r.questionIndex],c=document.getElementById('chart');if(!c)return;if(!window.Chart){c.parentElement.innerHTML=`<div class="p-6 text-center font-bold text-slate-600">${L('chartFail')}</div>`;return}if(chart)chart.destroy();chart=new Chart(c,{type:'bar',data:{labels:opts(q).map((o,i)=>`${optionLabel(i)}. ${o}`),datasets:[{data:r.counts,backgroundColor:opts(q).map((_,i)=>i===q.c?'#FACC15':'#001E62'),borderRadius:12}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:(ctx)=>{const n=r.voters[ctx.dataIndex]||[];return n.length?`${L('selectedBy')}: `+n.join(', '):L('selectedNone')}}}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}})}
function renderHostFinal(){hostShell(`<section class="panel rounded-[2rem] p-10 text-center h-full"><div class="text-yellow-500 mb-4">${icon('trophy','w-20 h-20')}</div><h1 class="text-6xl font-black mb-8 text-[#001E62]">${L('ranking')}</h1><div class="max-w-4xl mx-auto space-y-3">${ranks().map((p,i)=>`<div class="rounded-[2rem] ${i===0?'rank1':'rankN'} p-5 flex justify-between shadow border"><b class="text-2xl">${i+1}. ${esc(p.name)}</b><b class="text-4xl">${p.score}</b></div>`).join('')}</div></section>`)}
function subscribeAndJoin(after){saveRoom();const join=()=>{safeSubscribe(`${base}/host`);pub(`${base}/player`,{type:'join',id:player.id,name:player.name,roomId:room});after&&after()};client&&client.connected?join():connect(join)}
function autoReconnectPlayer(){if(!player.name){renderPlayerLogin();return}renderPlayerWaiting(L('reconnecting'));subscribeAndJoin(()=>renderPlayerWaiting(L('joined')))}
function renderPlayerLogin(){viewKey='login';app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5 safe"><section class="panel rounded-[2rem] p-7 text-center w-full max-w-md"><img src="${LOGO}" class="logo-sm mx-auto mb-6">${langSelect()}<p class="text-[#001E62] font-black text-xl mb-1">Room ID：${esc(room)}</p><h1 class="text-3xl font-black mb-3 text-[#001E62]">${L('nick')}</h1><input id="nickname" maxlength="10" value="${esc(player.name)}" class="w-full rounded-2xl p-5 text-[#001E62] font-black text-2xl text-center outline-none mb-5 border" placeholder="${L('namePlaceholder')}"><button id="joinBtn" class="btn w-full rounded-2xl gold py-5 font-black text-xl">${L('enter')}</button><p id="msg" class="mt-5 text-slate-600 text-sm"></p></section></main>`;document.getElementById('joinBtn').onclick=joinPlayer}
function joinPlayer(){const n=document.getElementById('nickname').value.trim().slice(0,10);if(!n){document.getElementById('msg').textContent=L('nick');return}player.name=n;saveIdentity();subscribeAndJoin(()=>renderPlayerWaiting(L('joined')))}
function onPlayer(d){if(d.type!=='state'||d.roomId!==room)return;lastPlayerState=d;if(typeof d.serverNow==='number')timeOffset=d.serverNow-Date.now();const me=d.players&&d.players[player.id];if(me){player.score=me.score;player.wrong=me.wrong;player.eliminated=me.eliminated}if(player.eliminated&&d.phase!=='final'){if(viewKey!=='eliminated'){viewKey='eliminated';renderPlayerEliminated()}return}if(d.phase==='lobby'){if(viewKey!=='lobby'){viewKey='lobby';renderPlayerWaiting(L('joined'))}return}if(d.phase==='question'){const newQ=player.lastQi!==d.questionIndex;if(newQ){player.selected=null;player.locked=false;player.lastQi=d.questionIndex;viewKey=''}if(d.answeredIds&&d.answeredIds.includes(player.id))player.locked=true;if(viewKey!==`q${d.questionIndex}`){renderPlayerQuestion(d);viewKey=`q${d.questionIndex}`}syncPlayerQuestionFromHost(d);return}if(d.phase==='result'){const key=`r${d.result&&d.result.questionIndex}`;if(viewKey!==key){viewKey=key;renderPlayerResult(d,me)}return}if(d.phase==='final'){if(viewKey!=='final'){viewKey='final';renderPlayerFinal(d)}return}}
function playerShell(c,dark=false){app.innerHTML=`<main id="playerMain" class="min-h-screen p-4 safe ${dark?'!bg-red-900':''}"><header class="flex items-center justify-between mb-4"><img src="${LOGO}" class="logo-sm">${langSelect(true)}</header>${c}</main>`}
function renderPlayerWaiting(msg){viewKey='waiting';playerShell(`<section class="panel rounded-[2rem] p-7 text-center min-h-[72vh] flex flex-col justify-center"><h1 class="text-3xl font-black mb-4 text-[#001E62]">${L('wait')}</h1><p class="text-slate-600 text-lg font-bold">${esc(msg)}</p><div class="mt-8 rounded-2xl bg-[#F4F7FF] p-5"><p class="font-bold text-slate-600">${L('yourName')}</p><p class="text-3xl font-black text-[#001E62]">${esc(player.name)}</p></div></section>`)}
function renderPlayerQuestion(d){const q=Q[d.questionIndex];playerShell(`<section><div class="panel rounded-[2rem] p-5 mb-4"><div class="flex justify-between mb-3"><p class="text-[#001E62] font-black">${L('question')} ${d.questionIndex+1} / ${Q.length}</p><div class="rounded-2xl bg-white text-[#001E62] px-4 py-2 border text-center"><p class="text-xs font-bold">${L('left')}</p><p id="pTime" class="text-3xl font-black">${getSyncedLeft(d.question)}</p></div></div><div class="barwrap h-3 bg-slate-200 rounded-full mb-4"><div id="pBar" class="bar"></div></div><h1 class="text-xl font-black">${esc(qText(q))}</h1></div><div class="space-y-3">${opts(q).map((op,i)=>`<button ${player.locked?'disabled':''} data-action="answer" data-answer="${i}" class="opt btn w-full rounded-3xl p-5 text-left font-black text-lg shadow-xl ${player.selected===i?'gold':'bg-white text-[#001E62]'}"><span class="inline-flex mr-4 w-11 h-11 rounded-full bg-[#001E62] text-white items-center justify-center">${optionLabel(i)}</span>${esc(op)}</button>`).join('')}</div><div class="mt-4 panel rounded-2xl p-4 text-center"><p id="sendMsg" class="font-black text-slate-600">${player.locked?L('sent'):L('choose')}</p><p class="mt-2 text-sm text-slate-600 font-bold">${L('wrongCount')}：${player.wrong} / ${MAX_WRONG}</p></div></section>`)}
function getSyncedLeft(q){if(!q)return 0;return Math.max(0,Math.ceil((q.endsAt-(Date.now()+timeOffset))/1000))}
/* FIX 2: progress bar uses milliseconds instead of integer seconds. */
function getSyncedMsLeft(q){if(!q)return 0;return Math.max(0,q.endsAt-(Date.now()+timeOffset))}
function syncPlayerQuestionFromHost(d){if(!d||!d.question)return;const total=d.question.time||QT,msLeft=getSyncedMsLeft(d.question),left=Math.ceil(msLeft/1000);const t=document.getElementById('pTime');if(t)t.textContent=left;const b=document.getElementById('pBar');if(b){const ratio=Math.max(0,Math.min(1,msLeft/(total*1000)));b.style.transform=`scaleX(${ratio})`;b.style.background=ratio<=.25?'#EF4444':'linear-gradient(90deg,#001E62,#3B82F6)'}if(d.answeredIds&&d.answeredIds.includes(player.id))player.locked=true;if(left<=0||player.locked){document.querySelectorAll('button[data-action="answer"]').forEach(btn=>{btn.disabled=true;if(left<=0)btn.classList.add('opacity-45')});const m=document.getElementById('sendMsg');if(m)m.textContent=player.locked?L('sent'):L('timeup')}cancelAnimationFrame(playerRAF);if(msLeft>0)playerRAF=requestAnimationFrame(()=>syncPlayerQuestionFromHost(d))}
function vibrate(p){try{if(navigator.vibrate)return navigator.vibrate(p)}catch{}}
function sendAnswer(i){if(player.locked)return;if(!Number.isInteger(i)||i<0||i>3)return;if(lastPlayerState&&lastPlayerState.question&&getSyncedLeft(lastPlayerState.question)<=0){player.locked=true;const mm=document.getElementById('sendMsg');if(mm)mm.textContent=L('timeup');return}const ok=pub(`${base}/player`,{type:'answer',id:player.id,answer:i,roomId:room,qi:player.lastQi});if(!ok){const m=document.getElementById('sendMsg');if(m)m.textContent=L('sendFail');return}vibrate(8);player.selected=i;player.locked=true;document.querySelectorAll('button[data-action="answer"]').forEach((b,idx)=>{b.disabled=true;if(idx===i)b.className=b.className.replace('bg-white text-[#001E62]','gold');else b.classList.add('opacity-45')});const sm=document.getElementById('sendMsg');if(sm)sm.textContent=L('sent')}
function renderPlayerResult(d,me){cancelAnimationFrame(playerRAF);const idx=d.result.questionIndex??player.lastQi,q=Q[idx],ok=me&&me.lastCorrect===true;if(!ok){vibrate([220,80,220,80,320]);setTimeout(()=>{const e=document.getElementById('playerMain');if(e)e.classList.add('shake')},30)}playerShell(`<section class="panel rounded-[2rem] p-5 text-center"><div class="${ok?'text-green-500':'text-red-500'} mb-4">${icon(ok?'check':'x','w-20 h-20')}</div><h1 class="text-4xl font-black ${ok?'text-green-600':'text-red-600'} mb-4">${ok?L('right'):L('wrong')}</h1><div class="rounded-3xl gold p-5 mb-4"><p class="font-bold">${L('correct')}</p><p class="text-2xl font-black">${optionLabel(q.c)}. ${esc(opts(q)[q.c])}</p></div>${visual(q.k,aText(q),subText(q))}<div class="rounded-3xl bg-[#F4F7FF] p-4 my-4 text-left"><p class="text-[#001E62] font-black">${L('exp')}</p><p class="font-bold text-slate-700">${esc(expText(q))}</p></div><div class="rounded-3xl bg-[#F4F7FF] p-4"><p class="font-bold text-slate-600">${L('wrongCount')}</p><p class="text-5xl font-black text-[#001E62]">${player.wrong} / ${MAX_WRONG}</p></div><p class="mt-4 text-slate-600 font-bold">${L('next')}</p></section>`)}
function renderPlayerEliminated(){playerShell(`<section class="rounded-[2rem] bg-red-700/90 p-8 text-center min-h-[78vh] flex flex-col justify-center text-white"><h1 class="text-6xl font-black mb-4">${L('eliminated')}</h1><p class="text-xl font-bold">${L('wrongCount')} ${player.wrong} / ${MAX_WRONG}</p></section>`,true)}
function renderPlayerFinal(d){cancelAnimationFrame(playerRAF);const rk=d.ranking||[];playerShell(`<section class="panel rounded-[2rem] p-6 text-center"><h1 class="text-4xl font-black mb-6 text-[#001E62]">${L('done')}</h1><div class="rounded-3xl gold p-6 mb-6"><p class="font-bold">${L('score')}</p><p class="text-6xl font-black">${player.score}</p></div><div class="space-y-3">${rk.map((p,i)=>`<div class="rounded-2xl bg-[#F4F7FF] p-4 flex justify-between"><b>${i+1}. ${esc(p.name)}</b><b>${p.score}</b></div>`).join('')}</div></section>`)}
/* FIX 1: force player current screen to rerender immediately after language change. */
function rerenderCurrent(){if(role==='host'){if(host.phase==='lobby')renderHostLobby();else if(host.phase==='question')renderHostQuestion();else if(host.phase==='result')renderHostResult();else if(host.phase==='final')renderHostFinal();else renderHome()}else if(role==='player'){if(lastPlayerState){const s=lastPlayerState;viewKey='';onPlayer(s);if(s.phase==='question')syncPlayerQuestionFromHost(s)}else if(room){viewKey='';player.name?renderPlayerWaiting(L('joined')):renderPlayerLogin()}else renderHome()}else renderHome()}
document.addEventListener('click',e=>{const el=e.target.closest('[data-action]');if(!el)return;const a=el.dataset.action;if(a==='start-host')startHost();else if(a==='manual-room')manualRoom();else if(a==='go-room')goManualRoom();else if(a==='resume-host')resumeHost();else if(a==='start-game')startGame();else if(a==='next-question')nextQuestion();else if(a==='answer')sendAnswer(Number(el.dataset.answer));else if(a==='rejoin')location.href=`${location.pathname}?room=${encodeURIComponent(lastRoom())}`});
document.addEventListener('change',e=>{const el=e.target;if(el.matches('[data-lang]')){setLang(el.value);rerenderCurrent()}});
if(document.readyState==='loading')window.addEventListener('DOMContentLoaded',boot);else boot();
</script>
