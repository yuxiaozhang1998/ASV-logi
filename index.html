{ja:"ベトナム国旗の「黄色い星」の5つの角が表す階級に含まれないのは？",zh:"越南國旗「黃色星星」的五個角所代表的階級中，不包含哪一項？",en:"Which class is NOT represented by the five points of the yellow star on the Vietnamese flag?",oJ:["農民","労働者","軍人","商人"],oZ:["農民","勞動者","軍人","商人"],oE:["Farmers","Workers","Soldiers","Merchants"],c:3,k:"flag",aJ:"商人",aZ:"商人",aE:"Merchants",sJ:"黄色い星に含まれない階級",sZ:"不包含在黃色星星中的階級",sE:"Class not represented by the yellow star",eJ:"黄色い星の5つの角は、一般的に「労働者、農民、知識人、青年、軍人」を表すとされています。つまり、国を支える主要な層を象徴しているとされ、商人はこの5つの分類には含まれません。",eZ:"黃色星星的五個角，一般被解釋為代表勞動者、農民、知識分子、青年與軍人。它象徵支撐國家的主要群體，因此「商人」不包含在這五個分類之中。",eE:"The five points of the yellow star are generally understood to represent workers, farmers, intellectuals, youth, and soldiers. Merchants are not included in these five groups."},
{ja:"ベトナムで主に栽培されているコーヒー豆の品種は？",zh:"越南主要栽培的咖啡豆品種是？",en:"What type of coffee bean is mainly grown in Vietnam?",oJ:["アラビカ種","ロブスタ種","リベリカ種","エクセルサ種"],oZ:["阿拉比卡種","羅布斯塔種","利比里卡種","埃塞爾薩種"],oE:["Arabica","Robusta","Liberica","Excelsa"],c:1,k:"coffee",aJ:"ロブスタ種",aZ:"羅布斯塔種",aE:"Robusta",sJ:"ベトナムコーヒー",sZ:"越南咖啡",sE:"Vietnamese coffee",eJ:"ベトナムではロブスタ種の栽培が特に盛んです。ロブスタは苦味とコクが強く、練乳を使ったベトナムコーヒーの濃厚な味わいにもよく合います。",eZ:"越南主要栽培羅布斯塔咖啡豆。羅布斯塔苦味較強、口感厚實，與加入煉乳的越南咖啡非常搭配，也是越南咖啡風味鮮明的重要原因。",eE:"Vietnam is especially known for Robusta coffee. Robusta has a strong bitterness and rich body, which pairs well with the condensed milk used in Vietnamese coffee."},
{ja:"ベトナムの通貨「ドン（Đồng）」の本来の意味は？",zh:"越南貨幣「盾（Đồng）」原本的意思是？",en:"What is the original meaning of Vietnam’s currency name “Đồng”?",oJ:["銅","銀","金","龍"],oZ:["銅","銀","金","龍"],oE:["Copper","Silver","Gold","Dragon"],c:0,k:"copper",aJ:"銅",aZ:"銅",aE:"Copper",sJ:"Đồngの本来の意味",sZ:"Đồng 原本的意思",sE:"Original meaning of Đồng",eJ:"ベトナム語の「Đồng」には本来「銅」という意味があります。通貨名に金属を表す言葉が使われている点は、歴史や貨幣文化を感じられるポイントです。",eZ:"越南語「Đồng」原本有「銅」的意思。貨幣名稱與金屬名稱相關，這一點也能看出貨幣與歷史文化之間的連結。",eE:"In Vietnamese, “Đồng” originally means copper. The use of a metal-related word as a currency name reflects historical and monetary culture."},
{ja:"1950年、オニツカ株式会社（現ASICS）が最初に発売した競技用シューズの種目は？",zh:"1950年，鬼塚株式會社（現ASICS）最初推出的競技鞋種目是？",en:"In 1950, what sport was the first competition shoe released by Onitsuka Co., Ltd. / ASICS made for?",oJ:["マラソン","バスケットボール","レスリング","体操"],oZ:["馬拉松","籃球","摔跤","體操"],oE:["Marathon","Basketball","Wrestling","Gymnastics"],c:1,k:"basket",aJ:"バスケットボール",aZ:"籃球",aE:"Basketball",sJ:"最初の競技用シューズ",sZ:"最初的競技用鞋",sE:"First competition shoe",eJ:"最初に発売した競技用シューズはバスケットボールシューズです。当時は体育館でのグリップや動きやすさが重要で、ここからスポーツシューズ開発の歴史が始まりました。",eZ:"最初推出的競技用鞋是籃球鞋。當時室內球場的抓地力與靈活移動非常重要，也成為之後運動鞋開發歷史的起點。",eE:"The first competition shoe released was a basketball shoe. Grip and mobility on indoor courts were important, marking the start of the company’s sports shoe development history."},
{ja:"1986年、初めて「GEL」を搭載したシューズのモデル名は？",zh:"1986年，第一款搭載「GEL」的鞋款名稱是？",en:"What was the model name of the first shoe equipped with GEL in 1986?",oJ:["GT-II","TARTHER","GEL-LYTE","KAYANO"],oZ:["GT-II","TARTHER","GEL-LYTE","KAYANO"],oE:["GT-II","TARTHER","GEL-LYTE","KAYANO"],c:0,k:"shoe",aJ:"GT-II",aZ:"GT-II",aE:"GT-II",sJ:"初のGEL搭載モデル",sZ:"首款搭載 GEL 的鞋款",sE:"First model with GEL",eJ:"GT-IIは、初めてGELを搭載したモデルとして知られています。GELは衝撃をやわらげる技術として、その後のランニングシューズに大きな影響を与えました。",eZ:"GT-II 被認為是首款搭載 GEL 的鞋款。GEL 主要用於緩和落地衝擊，之後也成為跑鞋科技中非常具代表性的元素。",eE:"GT-II is known as the first model equipped with GEL. GEL helped absorb impact and later became one of ASICS’ representative running shoe technologies."},
{ja:"1966年に誕生した、アシックスストライプの当時の呼び名は？",zh:"1966年誕生的 ASICS 側邊條紋，當時被稱為？",en:"What was the ASICS stripe, created in 1966, called at that time?",oJ:["タイガーライン","オリンピックライン","メキシコライン","スピードライン"],oZ:["老虎線","奧運線","墨西哥線","速度線"],oE:["Tiger Line","Olympic Line","Mexico Line","Speed Line"],c:2,k:"stripe",aJ:"メキシコライン",aZ:"墨西哥線",aE:"Mexico Line",sJ:"1966年に誕生",sZ:"1966年誕生",sE:"Created in 1966",eJ:"アシックスストライプは当時「メキシコライン」と呼ばれていました。現在もシューズ側面の象徴的なデザインとして、多くのモデルに受け継がれています。",eZ:"ASICS 側邊條紋當時被稱為「墨西哥線」。這個設計後來成為鞋側非常具代表性的視覺元素，延續到許多鞋款之中。",eE:"The ASICS stripe was called the “Mexico Line” at that time. It remains an iconic side design used across many models today."},
{ja:"初代「GEL-KAYANO」のデザインモチーフとなった昆虫は？",zh:"初代「GEL-KAYANO」的設計靈感來自哪種昆蟲？",en:"Which insect inspired the design of the first GEL-KAYANO?",oJ:["クワガタ","カブトムシ","トンボ","カマキリ"],oZ:["鍬形蟲","獨角仙","蜻蜓","螳螂"],oE:["Stag beetle","Rhinoceros beetle","Dragonfly","Mantis"],c:0,k:"beetle",aJ:"クワガタ",aZ:"鍬形蟲",aE:"Stag beetle",sJ:"GEL-KAYANOのモチーフ",sZ:"GEL-KAYANO 的設計靈感",sE:"GEL-KAYANO design motif",eJ:"初代GEL-KAYANOのデザインモチーフはクワガタです。クワガタの力強い大顎や安定感のある姿から、サポート性や力強さを表現するイメージが取り入れられました。",eZ:"初代 GEL-KAYANO 的設計靈感來自鍬形蟲。鍬形蟲強而有力的大顎與穩定的姿態，被用來表現鞋款的支撐性與力量感。",eE:"The first GEL-KAYANO was inspired by the stag beetle. Its strong jaws and stable form were used to express support and strength."},
{ja:"社名の由来「Anima Sana In Corpore Sano」を残した古代ローマの詩人は？",zh:"公司名稱由來「Anima Sana In Corpore Sano」與哪位古羅馬詩人相關？",en:"Which ancient Roman poet is connected to the phrase “Anima Sana In Corpore Sano”?",oJ:["ユウェナリス","ホラティウス","ウェルギリウス","オウィディウス"],oZ:["尤維納利斯","賀拉斯","維吉爾","奧維德"],oE:["Juvenal","Horace","Virgil","Ovid"],c:0,k:"roman",aJ:"ユウェナリス",aZ:"尤維納利斯",aE:"Juvenal",sJ:"古代ローマの詩人",sZ:"古羅馬詩人",sE:"Ancient Roman poet",eJ:"この言葉に関係する古代ローマの詩人がユウェナリスです。「健全な身体に健全な精神があれかし」という考え方は、スポーツと心身の健康を結びつける理念として知られています。",eZ:"這句話與古羅馬詩人尤維納利斯有關。「健全的身體中有健全的精神」這一理念，也呼應了運動與身心健康之間的關係。",eE:"The phrase is connected to the ancient Roman poet Juvenal. The idea links physical health and mental well-being, which fits closely with the spirit of sports."},
{ja:"計画中のベトナム「南北高速鉄道」の最高設計速度は？",zh:"規劃中的越南「南北高速鐵路」最高設計速度是？",en:"What is the planned maximum design speed of Vietnam’s North–South high-speed railway?",oJ:["250 km/h","300 km/h","350 km/h","400 km/h"],oZ:["250 km/h","300 km/h","350 km/h","400 km/h"],oE:["250 km/h","300 km/h","350 km/h","400 km/h"],c:2,k:"train",aJ:"350 km/h",aZ:"350 km/h",aE:"350 km/h",sJ:"南北高速鉄道",sZ:"南北高速鐵路",sE:"North–South high-speed railway",eJ:"南北高速鉄道では最高設計速度として350 km/hが示されています。ハノイとホーチミン市を結ぶ大規模プロジェクトで、移動時間の短縮が期待されています。",eZ:"南北高速鐵路最高設計速度為 350 km/h。這是連結河內與胡志明市的大型項目，未來有望大幅縮短南北移動時間。",eE:"The planned maximum design speed is 350 km/h. It is a major project connecting Hanoi and Ho Chi Minh City and is expected to shorten travel time."},
{ja:"ベトナム料理「フォー」のスープに通常「使われない」のは？",zh:"越南料理「河粉」湯底通常不會使用哪一種香料？",en:"Which spice is usually NOT used in the soup for Vietnamese phở?",oJ:["八角","シナモン","クミン","クローブ"],oZ:["八角","肉桂","孜然","丁香"],oE:["Star anise","Cinnamon","Cumin","Clove"],c:2,k:"spice",aJ:"クミン",aZ:"孜然",aE:"Cumin",sJ:"フォーには通常使われない香辛料",sZ:"河粉通常不使用的香料",sE:"Spice usually not used in phở",eJ:"フォーのスープには八角、シナモン、クローブなどがよく使われます。一方、クミンは中東料理やインド料理でよく使われる香辛料で、一般的なフォーの香りとは少し方向性が違います。",eZ:"河粉湯底常用八角、肉桂、丁香等香料。孜然則更常見於中東或印度料理，香氣方向與一般河粉湯底不太相同。",eE:"Phở broth often uses spices such as star anise, cinnamon, and clove. Cumin is more common in Middle Eastern or Indian cuisine and is not typical for phở broth."}

="78" fill="#E5E7EB"/><circle cx="450" cy="130" r="66" fill="#F3F4F6"/>',train:'<path d="M150 330c125-122 440-158 600-78 50 25 32 78-28 78H150z" fill="#E8F1FF"/><text x="382" y="212" font-size="62" fill="#FACC15" font-weight="900">350</text>',spice:'<path d="M280 268c66 80 276 80 340 0 10 102-70 165-170 165S270 370 280 268z" fill="#fff"/><text x="372" y="170" font-size="52" fill="#FACC15" font-weight="900">Cumin</text>'};return `<div class="v"><svg viewBox="0 0 900 520"><defs><linearGradient id="g" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#07132f"/><stop offset=".55" stop-color="#001E62"/><stop offset="1" stop-color="#004AA5"/></linearGradient></defs><rect width="900" height="520" rx="46" fill="url(#g)"/><circle cx="740" cy="118" r="94" fill="#FACC15" opacity=".92"/>${m[k]||m.basket}<text x="62" y="86" font-size="28" fill="#FACC15" font-weight="900">ANSWER VISUAL</text><text x="62" y="452" font-size="56" fill="#fff" font-weight="900">${esc(title)}</text><text x="64" y="493" font-size="28" fill="rgba(255,255,255,.86)" font-weight="700">${esc(sub)}</text></svg></div>`}
function boot(){try{let p=new URLSearchParams(location.search);if(p.get('room')){role='player';room=p.get('room').toUpperCase();base=`${PREFIX}/${room}`;saveRoom();player.name?autoReconnectPlayer():renderPlayerLogin()}else renderHome()}catch(err){console.error(err);app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5"><section class="panel rounded-[2rem] p-8 max-w-2xl w-full"><h1 class="text-3xl font-black mb-4 text-[#001E62]">ASV Quiz load error</h1><p class="font-bold text-slate-700 mb-4">${esc(err&&err.message?err.message:err)}</p><pre class="bg-slate-900 text-white rounded-2xl p-4 overflow-auto text-sm">${esc(err&&err.stack?err.stack:err)}</pre></section></main>`}}
if(document.readyState==='loading')window.addEventListener('DOMContentLoaded',boot);else boot();
function connect(cb){if(!window.mqtt){toast('MQTT load error');return}client=mqtt.connect(BROKER,{clientId:`quiz_${role}_${Math.random().toString(36).slice(2,9)}`,clean:true,reconnectPeriod:2000,connectTimeout:8000});client.on('connect',()=>{role==='host'?host.connected=true:player.connected=true;if(role==='host'&&base){client.subscribe(`${base}/player`);setTimeout(()=>broadcast(),300)}cb&&cb();updateConn()});client.on('close',()=>{role==='host'?host.connected=false:player.connected=false;updateConn()});client.on('message',(t,m)=>{let d;try{d=JSON.parse(m.toString())}catch{return}role==='host'?onHost(d):onPlayer(d)})}
function updateConn(){document.querySelectorAll('[data-conn]').forEach(el=>{let ok=role==='host'?host.connected:player.connected;el.className=`inline-flex items-center gap-2 rounded-full px-4 py-2 font-black ${ok?'bg-green-400 text-[#001E62]':'bg-red-500 text-white'}`;el.innerHTML=`${icon(ok?'wifi':'off','w-4 h-4')}${ok?'Connected':'Reconnecting'}`})}
function renderHome(){app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5"><section class="panel rounded-[2rem] p-8 md:p-12 text-center max-w-3xl w-full fade"><img src="${LOGO}" class="logo mx-auto mb-8"><h1 class="text-4xl md:text-6xl font-black mb-4 text-[#001E62]">ASV Quiz Party</h1><p class="text-slate-600 mb-10 font-bold">The host runs the quiz on a PC or projector screen. Participants answer from their smartphones.</p>${(typeof loadHostState==='function'&&loadHostState())?`<button onclick="resumeHost()" class="btn w-full rounded-3xl blue py-4 font-black text-xl shadow-xl mb-3">${T('resumeHost')}：${esc((typeof loadHostState==='function'&&loadHostState()?loadHostState().room:''))}</button>`:''}${(typeof lastRoom==='function'&&lastRoom()&&player.name)?`<button onclick="location.href='${location.pathname}?room=${encodeURIComponent(typeof lastRoom==='function'?lastRoom():'')}'" class="btn w-full rounded-3xl gold py-4 font-black text-xl shadow-xl mb-5">${T('rejoin')}：${esc((typeof lastRoom==='function'?lastRoom():''))}</button>`:''}<div class="grid md:grid-cols-2 gap-5"><button onclick="startHost()" class="btn rounded-3xl blue p-8 font-black text-2xl shadow-2xl">${icon('monitor','w-12 h-12')}<br>Host</button><button onclick="manualRoom()" class="btn rounded-3xl gold p-8 font-black text-2xl shadow-2xl">${icon('phone','w-12 h-12')}<br>Participant</button></div></section></main>`}
function manualRoom(){app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5"><section class="panel rounded-[2rem] p-7 text-center w-full max-w-md fade"><img src="${LOGO}" class="logo-sm mx-auto mb-6"><select onchange="setLang(this.value);manualRoom()" class="mb-4 rounded-2xl border px-4 py-3 font-black text-[#001E62]"><option value="ja" ${lang()==='ja'?'selected':''}>日本語</option><option value="zh" ${lang()==='zh'?'selected':''}>繁體中文</option><option value="en" ${lang()==='en'?'selected':''}>English</option></select><h1 class="text-3xl font-black mb-3 text-[#001E62]">Room ID</h1><input id="manualRoom" maxlength="5" class="w-full text-center text-3xl tracking-[.3em] uppercase rounded-2xl p-5 text-[#001E62] font-black outline-none mb-5 border" placeholder="A7K29"><button onclick="goManualRoom()" class="btn w-full rounded-2xl gold py-5 font-black text-xl">${T('enter')}</button></section></main>`}
function goManualRoom(){let v=document.getElementById('manualRoom').value.trim().toUpperCase();if(v.length!==5){alert('Please enter a 5-character Room ID.');return}location.href=`${location.pathname}?room=${encodeURIComponent(v)}`}
function resumeHost(){let s=loadHostState();if(!s||!s.room||!s.host){alert('No host session found.');renderHome();return}role='host';room=s.room;base=`${PREFIX}/${room}`;host=s.host;host.connected=false;connect(()=>{client.subscribe(`${base}/player`);broadcast();if(host.phase==='lobby')renderHostLobby();else if(host.phase==='question'){renderHostQuestion();startHostTimer()}else if(host.phase==='result')renderHostResult();else if(host.phase==='final')renderHostFinal();else renderHostLobby()})}
function startHost(){clearHostState();role='host';room=makeRoom();base=`${PREFIX}/${room}`;host={phase:'lobby',players:{},qi:-1,answers:{},remain:20,result:null,connected:false,endsAt:0};connect(()=>{client.subscribe(`${base}/player`);renderHostLobby();broadcast()})}
function hostShell(c){app.innerHTML=`<main class="host"><header class="hh flex items-center justify-between mb-5"><img src="${LOGO}" class="logo"><div><div data-conn></div><p class="mt-1 text-slate-600 font-bold">Participants: ${all().length}</p></div></header><div class="hc">${c}</div></main>`;updateConn()}
function renderHostLobby(){host.phase='lobby';let u=joinURL();hostShell(`<section class="grid lg:grid-cols-[400px_1fr] gap-6 h-full"><div class="panel rounded-[2rem] p-7 text-center"><h1 class="text-4xl font-black mb-5 text-[#001E62]">Waiting for Participants</h1><div id="qrcode" class="qr-box bg-white rounded-[2rem] p-4 inline-flex items-center justify-center mb-5 w-[300px] h-[300px] max-w-full border"></div><div class="rounded-3xl bg-[#F4F7FF] p-5 mb-6"><p class="text-slate-600 font-bold">Current Participants</p><p class="text-7xl font-black text-[#001E62]">${all().length}</p></div><button onclick="startGame()" class="btn pulse w-full rounded-3xl gold py-5 font-black text-3xl">${icon('play','w-8 h-8')} Start Game</button></div><div class="panel rounded-[2rem] p-7"><h2 class="text-3xl font-black mb-5 text-[#001E62]">Participant List</h2><div class="grid md:grid-cols-2 xl:grid-cols-3 gap-4">${all().length?all().map(p=>`<div class="rounded-2xl bg-[#F4F7FF] p-4 font-bold flex justify-between text-[#001E62]"><span>${esc(p.name)}</span><span class="text-green-600">Waiting</span></div>`).join(''):'<p class="text-slate-600 text-xl font-bold">Please scan the QR code to join.</p>'}</div></div></section>`);setTimeout(()=>{let el=document.getElementById('qrcode');if(el&&window.QRCode)new QRCode(el,{text:u,width:280,height:280,colorDark:'#001E62',colorLight:'#fff'})},0)}
function onHost(d){if(d.type==='join'){let old=host.players[d.id]||{};host.players[d.id]={id:d.id,name:String(d.name||'ゲスト').slice(0,10),score:old.score||0,wrong:old.wrong||0,eliminated:!!old.eliminated};if(host.phase==='lobby')renderHostLobby();broadcast()}if(d.type==='answer'){if(host.phase!=='question')return;if(Date.now()>=host.endsAt)return;let p=host.players[d.id];if(!p||p.eliminated||host.answers[d.id]!==undefined)return;host.answers[d.id]=Number(d.answer);updateHostLive();broadcast();if(Object.keys(host.answers).length>=alive().length)finishQuestion()}}
function state(){return{type:'state',phase:host.phase,roomId:room,serverNow:Date.now(),questionIndex:host.qi,totalQuestions:Q.length,question:host.phase==='question'?{time:QT,endsAt:host.endsAt}:null,result:host.result,players:host.players,ranking:ranks(),answeredIds:Object.keys(host.answers)}}
function broadcast(){saveHostState();pub(`${base}/host`,state())}function startGame(){if(!all().length){alert('No participants have joined yet.');return}nextQuestion()}
function nextQuestion(){if(host.qi>=Q.length-1){host.phase='final';renderHostFinal();broadcast();return}host.qi++;host.phase='question';host.answers={};host.result=null;host.remain=QT;host.endsAt=Date.now()+QT*1000;renderHostQuestion();broadcast();startHostTimer()}
function startHostTimer(){clearInterval(hostTimer);cancelAnimationFrame(hostRAF);hostTimer=setInterval(()=>{host.remain=Math.max(0,Math.ceil((host.endsAt-Date.now())/1000));updateHostLive();if(host.remain<=0)finishQuestion()},200);animate('hBar',host.endsAt,QT,v=>hostRAF=v)}
function animate(id,ends,total,setter){function tick(){let left=Math.max(0,(ends-Date.now())/(total*1000)),b=document.getElementById(id);if(b){b.style.transform=`scaleX(${left})`;b.style.background=left<=.25?'#EF4444':'linear-gradient(90deg,#001E62,#3B82F6)'}if(left>0)setter(requestAnimationFrame(tick))}tick()}
function renderHostQuestion(){let q=Q[host.qi];hostShell(`<section class="panel rounded-[2rem] p-7 h-full"><div class="grid lg:grid-cols-[1fr_230px] gap-5 mb-5"><p class="text-[#001E62] font-black text-2xl">Question ${host.qi+1} / ${Q.length}</p><div class="text-center rounded-[2rem] bg-white text-[#001E62] border px-8 py-4"><p class="font-bold">Time Left</p><p id="hTime" class="text-5xl font-black">${host.remain}</p></div></div><div class="barwrap h-4 bg-slate-200 rounded-full mb-6"><div id="hBar" class="bar"></div></div><div class="grid xl:grid-cols-[1fr_330px] gap-6"><div><h1 class="text-4xl md:text-5xl font-black leading-tight mb-7">${esc(qText(q))}</h1><div class="grid md:grid-cols-2 gap-4">${opts(q).map((op,i)=>`<div class="rounded-3xl bg-[#F4F7FF] text-[#001E62] p-5 text-2xl font-black flex gap-4"><span class="rounded-full bg-[#001E62] text-white w-12 h-12 flex items-center justify-center shrink-0">${String.fromCharCode(65+i)}</span>${esc(op)}</div>`).join('')}</div></div><aside><div class="rounded-3xl bg-[#F4F7FF] p-7"><p class="text-slate-600 font-bold">Answers</p><p class="text-6xl font-black text-[#001E62]"><span id="hAnswered">0</span> / <span id="hAlive">${alive().length}</span></p></div></aside></div></section>`);updateHostLive()}
function updateHostLive(){let a=Object.keys(host.answers).length;let ht=document.getElementById('hTime'),ha=document.getElementById('hAnswered'),hl=document.getElementById('hAlive');if(ht)ht.textContent=host.remain;if(ha)ha.textContent=a;if(hl)hl.textContent=alive().length}
function finishQuestion(){if(host.phase!=='question')return;clearInterval(hostTimer);cancelAnimationFrame(hostRAF);let q=Q[host.qi],counts=[0,0,0,0],voters=[[],[],[],[]];Object.entries(host.answers).forEach(([id,a])=>{if(a>=0&&a<4){counts[a]++;if(host.players[id])voters[a].push(host.players[id].name)}});all().forEach(p=>{if(p.eliminated)return;let ok=host.answers[p.id]===q.c;p.lastCorrect=ok;if(ok)p.score+=100;else{p.wrong++;if(p.wrong>=MAX_WRONG)p.eliminated=true}});host.phase='result';host.result={questionIndex:host.qi,questionText:qText(q),options:opts(q),correct:q.c,correctText:opts(q)[q.c],counts,voters,explain:expText(q),title:aText(q),sub:subText(q),kind:q.k};renderHostResult();broadcast()}
function renderHostResult(){let r=host.result;hostShell(`<section class="grid xl:grid-cols-[1.05fr_.95fr] gap-6 h-full"><div class="panel rounded-[2rem] p-6"><p class="text-[#001E62] font-black text-2xl mb-2">Correct Answer</p><h1 class="text-3xl font-black mb-4">${esc(r.questionText)}</h1><div class="bg-white rounded-[2rem] p-4 border" style="height:40vh"><canvas id="chart"></canvas></div><div class="grid grid-cols-2 gap-4 mt-4"><div class="rounded-2xl bg-[#F4F7FF] p-4"><p class="font-bold text-slate-600">Remaining Players</p><p class="text-4xl font-black text-[#001E62]">${alive().length}</p></div><div class="rounded-2xl bg-[#F4F7FF] p-4"><p class="font-bold text-slate-600">Eliminated Players</p><p class="text-4xl font-black text-[#001E62]">${all().filter(p=>p.eliminated).length}</p></div></div></div><div class="panel rounded-[2rem] p-6 flex flex-col"><div class="rounded-[2rem] gold p-5 mb-4"><p class="text-4xl font-black">${String.fromCharCode(65+r.correct)}</p><p class="text-2xl font-black">${esc(r.correctText)}</p></div>${visual(r.kind,r.title,r.sub)}<div class="rounded-3xl bg-[#F4F7FF] p-4 my-4"><p class="text-[#001E62] font-black">Explanation</p><p class="font-bold text-slate-700">${esc(r.explain)}</p></div><button onclick="nextQuestion()" class="btn mt-auto rounded-3xl blue py-4 font-black text-2xl">${host.qi>=Q.length-1?'Ranking':'Next Question'}</button></div></section>`);setTimeout(drawChart,0)}
function drawChart(){let r=host.result,c=document.getElementById('chart');if(!c)return;if(chart)chart.destroy();chart=new Chart(c,{type:'bar',data:{labels:r.options.map((o,i)=>`${String.fromCharCode(65+i)}. ${o}`),datasets:[{data:r.counts,backgroundColor:r.options.map((_,i)=>i===r.correct?'#FACC15':'#001E62'),borderRadius:12}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:(ctx)=>{let n=r.voters[ctx.dataIndex]||[];return n.length?'Selected by: '+n.join(', '):'Selected by: none'}}}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}})}
function renderHostFinal(){hostShell(`<section class="panel rounded-[2rem] p-10 text-center h-full"><div class="text-yellow-500 mb-4">${icon('trophy','w-20 h-20')}</div><h1 class="text-6xl font-black mb-8 text-[#001E62]">Ranking</h1><div class="max-w-4xl mx-auto space-y-3">${ranks().map((p,i)=>`<div class="rounded-[2rem] ${i===0?'rank1':'rankN'} p-5 flex justify-between shadow border"><b class="text-2xl">${i+1}. ${esc(p.name)}</b><b class="text-4xl">${p.score}</b></div>`).join('')}</div></section>`)}
function subscribeAndJoin(after){playerJoined=true;saveRoom();let join=()=>{client.subscribe(`${base}/host`);pub(`${base}/player`,{type:'join',id:player.id,name:player.name});after&&after()};if(client&&client.connected)join();else connect(join)}
function autoReconnectPlayer(){if(!player.name){renderPlayerLogin();return}renderPlayerWaiting(T('reconnecting'));subscribeAndJoin(()=>renderPlayerWaiting(T('joined')))}
function changePlayerLang(l){setLang(l);if(lastPlayerState){onPlayer(lastPlayerState);return}if(role==='player'&&room){player.name?renderPlayerWaiting(T('joined')):renderPlayerLogin();return}manualRoom()}
function renderPlayerLogin(){app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5 safe"><section class="panel rounded-[2rem] p-7 text-center w-full max-w-md"><img src="${LOGO}" class="logo-sm mx-auto mb-6"><select onchange="changePlayerLang(this.value)" class="mb-4 rounded-2xl border px-4 py-3 font-black text-[#001E62]"><option value="ja" ${lang()==='ja'?'selected':''}>日本語</option><option value="zh" ${lang()==='zh'?'selected':''}>繁體中文</option><option value="en" ${lang()==='en'?'selected':''}>English</option></select><p class="text-[#001E62] font-black text-xl mb-1">Room ID：${esc(room)}</p><h1 class="text-3xl font-black mb-3 text-[#001E62]">${T('name')}</h1><input id="nickname" maxlength="10" value="${esc(player.name)}" class="w-full rounded-2xl p-5 text-[#001E62] font-black text-2xl text-center outline-none mb-5 border" placeholder="${lang()==='zh'?'名字':lang()==='en'?'Your name':'お名前'}"><button onclick="joinPlayer()" class="btn w-full rounded-2xl gold py-5 font-black text-xl">${T('enter')}</button><p id="msg" class="mt-5 text-slate-600 text-sm"></p></section></main>`}
function joinPlayer(){let n=document.getElementById('nickname').value.trim().slice(0,10);if(!n){document.getElementById('msg').textContent='Please enter your nickname.';return}player.name=n;saveP();subscribeAndJoin(()=>renderPlayerWaiting(T('joined')))}
function onPlayer(d){if(d.type!=='state')return;lastPlayerState=d;if(typeof d.serverNow==='number')timeOffset=d.serverNow-Date.now();let me=d.players&&d.players[player.id];if(me){player.score=me.score;player.wrong=me.wrong;player.eliminated=me.eliminated;saveP()}if(player.eliminated&&d.phase!=='final'){renderPlayerEliminated();return}if(d.phase==='lobby')renderPlayerWaiting(T('joined'));if(d.phase==='question'){if(player.lastQi!==d.questionIndex){player.selected=null;player.locked=false;player.lastQi=d.questionIndex}if(d.answeredIds&&d.answeredIds.includes(player.id))player.locked=true;renderPlayerQuestion(d);startPlayerTimer(d.question.endsAt,d.question.time)}if(d.phase==='result'){renderPlayerResult(d,me)}if(d.phase==='final')renderPlayerFinal(d)}
function playerShell(c,d=false){app.innerHTML=`<main id="playerMain" class="min-h-screen p-4 safe ${d?'!bg-red-900':''}"><header class="flex items-center justify-between mb-4"><img src="${LOGO}" class="logo-sm"><select onchange="changePlayerLang(this.value)" class="rounded-xl border px-2 py-1 text-xs font-black text-[#001E62]"><option value="ja" ${lang()==='ja'?'selected':''}>日本語</option><option value="zh" ${lang()==='zh'?'selected':''}>繁中</option><option value="en" ${lang()==='en'?'selected':''}>EN</option></select></header>${c}</main>`}
function renderPlayerWaiting(msg){playerShell(`<section class="panel rounded-[2rem] p-7 text-center min-h-[72vh] flex flex-col justify-center"><h1 class="text-3xl font-black mb-4 text-[#001E62]">${T('wait')}</h1><p class="text-slate-600 text-lg font-bold">${esc(msg)}</p><div class="mt-8 rounded-2xl bg-[#F4F7FF] p-5"><p class="font-bold text-slate-600">${lang()==='zh'?'你的名字':lang()==='en'?'Your name':'あなたの名前'}</p><p class="text-3xl font-black text-[#001E62]">${esc(player.name)}</p></div></section>`)}
function renderPlayerQuestion(d){let q=Q[d.questionIndex];playerShell(`<section><div class="panel rounded-[2rem] p-5 mb-4"><div class="flex justify-between mb-3"><p class="text-[#001E62] font-black">${lang()==='en'?'Question':'第'} ${d.questionIndex+1} / ${Q.length}</p><div class="rounded-2xl bg-white text-[#001E62] px-4 py-2 border text-center"><p class="text-xs font-bold">${T('left')}</p><p id="pTime" class="text-3xl font-black">${d.question.time}</p></div></div><div class="barwrap h-3 bg-slate-200 rounded-full mb-4"><div id="pBar" class="bar"></div></div><h1 class="text-xl font-black">${esc(qText(q))}</h1></div><div class="space-y-3">${opts(q).map((op,i)=>`<button ${player.locked?'disabled':''} onclick="sendAnswer(${i})" class="opt btn w-full rounded-3xl p-5 text-left font-black text-lg shadow-xl ${player.selected===i?'gold':'bg-white text-[#001E62]'}"><span class="inline-flex mr-4 w-11 h-11 rounded-full bg-[#001E62] text-white items-center justify-center">${String.fromCharCode(65+i)}</span>${esc(op)}</button>`).join('')}</div><div class="mt-4 panel rounded-2xl p-4 text-center"><p id="sendMsg" class="font-black text-slate-600">${player.locked?T('sent'):T('choose')}</p><p class="mt-2 text-sm text-slate-600 font-bold">${T('wrongCount')}：${player.wrong} / ${MAX_WRONG}</p></div></section>`)}
function startPlayerTimer(ends,total){clearInterval(playerTimer);cancelAnimationFrame(playerRAF);const hostNow=()=>Date.now()+timeOffset;function lockTimeUp(){player.locked=true;document.querySelectorAll('button[onclick^="sendAnswer"]').forEach(b=>{b.disabled=true;b.classList.add('opacity-45')});let m=document.getElementById('sendMsg');if(m)m.textContent='Time up'}function update(){let leftMs=ends-hostNow(),left=Math.max(0,Math.ceil(leftMs/1000)),t=document.getElementById('pTime');if(t)t.textContent=left;if(leftMs<=0){clearInterval(playerTimer);lockTimeUp()}}playerTimer=setInterval(update,100);update();animatePlayerBar('pBar',ends,total,v=>playerRAF=v)}function animatePlayerBar(id,ends,total,setter){function tick(){let left=Math.max(0,(ends-(Date.now()+timeOffset))/(total*1000)),b=document.getElementById(id);if(b){b.style.transform=`scaleX(${left})`;b.style.background=left<=.25?'#EF4444':'linear-gradient(90deg,#001E62,#3B82F6)'}if(left>0)setter(requestAnimationFrame(tick))}tick()}function vibrate(p){try{if(navigator.vibrate)return navigator.vibrate(p)}catch(e){}}
function sendAnswer(i){if(player.locked)return;if(lastPlayerState&&lastPlayerState.question&&lastPlayerState.question.endsAt&&Date.now()+timeOffset>=lastPlayerState.question.endsAt){player.locked=true;let m=document.getElementById('sendMsg');if(m)m.textContent='Time up';return}vibrate(8);player.selected=i;player.locked=true;pub(`${base}/player`,{type:'answer',id:player.id,answer:i});document.querySelectorAll('button[onclick^="sendAnswer"]').forEach((b,idx)=>{b.disabled=true;if(idx===i)b.className=b.className.replace('bg-white text-[#001E62]','gold');else b.classList.add('opacity-45')});let m=document.getElementById('sendMsg');if(m)m.textContent=T('sent')}
function renderPlayerResult(d,me){let idx=d.result.questionIndex??player.lastQi,q=Q[idx],ok=me&&me.lastCorrect===true;if(!ok){vibrate([220,80,220,80,320]);setTimeout(()=>{let e=document.getElementById('playerMain');if(e)e.classList.add('shake')},30)}playerShell(`<section class="panel rounded-[2rem] p-5 text-center"><div class="${ok?'text-green-500':'text-red-500'} mb-4">${icon(ok?'check':'x','w-20 h-20')}</div><h1 class="text-4xl font-black ${ok?'text-green-600':'text-red-600'} mb-4">${ok?T('right'):T('wrong')}</h1><div class="rounded-3xl gold p-5 mb-4"><p class="font-bold">${T('correct')}</p><p class="text-2xl font-black">${String.fromCharCode(65+q.c)}. ${esc(opts(q)[q.c])}</p></div>${visual(q.k,aText(q),subText(q))}<div class="rounded-3xl bg-[#F4F7FF] p-4 my-4 text-left"><p class="text-[#001E62] font-black">${T('exp')}</p><p class="font-bold text-slate-700">${esc(expText(q))}</p></div><div class="rounded-3xl bg-[#F4F7FF] p-4"><p class="font-bold text-slate-600">${T('wrongCount')}</p><p class="text-5xl font-black text-[#001E62]">${player.wrong} / ${MAX_WRONG}</p></div><p class="mt-4 text-slate-600 font-bold">${T('next')}</p></section>`)}
function renderPlayerEliminated(){playerShell(`<section class="rounded-[2rem] bg-red-700/90 p-8 text-center min-h-[78vh] flex flex-col justify-center text-white"><h1 class="text-6xl font-black mb-4">${lang()==='zh'?'淘汰':lang()==='en'?'Eliminated':'脱落'}</h1><p class="text-xl font-bold">${T('wrongCount')} ${player.wrong} / ${MAX_WRONG}</p></section>`,true)}
function renderPlayerFinal(d){let rk=d.ranking||[];playerShell(`<section class="panel rounded-[2rem] p-6 text-center"><h1 class="text-4xl font-black mb-6 text-[#001E62]">${T('done')}</h1><div class="rounded-3xl gold p-6 mb-6"><p class="font-bold">${T('score')}</p><p class="text-6xl font-black">${player.score}</p></div><div class="space-y-3">${rk.map((p,i)=>`<div class="rounded-2xl bg-[#F4F7FF] p-4 flex justify-between"><b>${i+1}. ${esc(p.name)}</b><b>${p.score}</b></div>`).join('')}</div></section>`)}
</script></body></html>
