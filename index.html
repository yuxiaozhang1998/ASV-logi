function renderHome(){let hs=loadHostState();app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5"><section class="panel rounded-[2rem] p-8 md:p-12 text-center max-w-3xl w-full fade"><img src="${LOGO}" class="logo mx-auto mb-8"><h1 class="text-4xl md:text-6xl font-black mb-4 text-[#001E62]">ASV Quiz Party</h1><p class="text-slate-600 mb-10 font-bold">The host runs the quiz on a PC or projector screen. Participants answer from their smartphones.</p>${hs?`<button onclick="resumeHost()" class="btn w-full rounded-3xl blue py-4 font-black text-xl shadow-xl mb-3">${T('resumeHost')}：${esc(hs.room||'')}</button>`:''}${(lastRoom()&&player.name)?`<button onclick="location.href='${location.pathname}?room=${encodeURIComponent(lastRoom())}'" data-rejoin-last class="btn w-full rounded-3xl gold py-4 font-black text-xl shadow-xl mb-5">${T('rejoin')}：${esc(lastRoom())}</button>`:''}<div class="grid md:grid-cols-2 gap-5"><button onclick="startHost()" class="btn rounded-3xl blue p-8 font-black text-2xl shadow-2xl">${icon('monitor','w-12 h-12')}<br>Host</button><button onclick="manualRoom()" class="btn rounded-3xl gold p-8 font-black text-2xl shadow-2xl">${icon('phone','w-12 h-12')}<br>Participant</button></div></section></main>`}
function manualRoom(){app.innerHTML=`<main class="min-h-screen flex items-center justify-center p-5"><section class="panel rounded-[2rem] p-7 text-center w-full max-w-md fade"><img src="${LOGO}" class="logo-sm mx-auto mb-6"><select onchange="setLang(this.value);manualRoom()" class="mb-4 rounded-2xl border px-4 py-3 font-black text-[#001E62]"><option value="ja" ${lang()==='ja'?'selected':''}>日本語</option><option value="zh" ${lang()==='zh'?'selected':''}>繁體中文</option><option value="en" ${lang()==='en'?'selected':''}>English</option></select><h1 class="text-3xl font-black mb-3 text-[#001E62]">Room ID</h1><input id="manualRoom" maxlength="5" class="w-full text-center text-3xl tracking-[.3em] uppercase rounded-2xl p-5 text-[#001E62] font-black outline-none mb-5 border" placeholder="A7K29"><button onclick="goManualRoom()" class="btn w-full rounded-2xl gold py-5 font-black text-xl">${T('enter')}</button></section></main>`}
function goManualRoom(){let v=document.getElementById('manualRoom').value.trim().toUpperCase();if(v.length!==5){alert('Please enter a 5-character Room ID.');return}location.href=`${location.pathname}?room=${encodeURIComponent(v)}`}
const HOST_VIEWS={lobby:renderHostLobby,question:()=>{renderHostQuestion();startHostTimer()},result:renderHostResult,final:renderHostFinal};
function renderHostByPhase(){(HOST_VIEWS[host.phase]||renderHostLobby)()}
function resumeHost(){let s=loadHostState();if(!s||!s.room||!s.host){alert('No host session found.');renderHome();return}role='host';room=s.room;base=`${PREFIX}/${room}`;host=s.host;host.connected=false;connect(()=>{client.subscribe(`${base}/player`);broadcast();renderHostByPhase()})}
function startHost(){clearHostState();role='host';room=makeRoom();base=`${PREFIX}/${room}`;host={phase:'lobby',players:{},qi:-1,answers:{},remain:20,result:null,connected:false,endsAt:0};connect(()=>{client.subscribe(`${base}/player`);renderHostLobby();broadcast()})}
function hostShell(c){app.innerHTML=`<main class="host"><header class="hh flex items-center justify-between mb-5"><img src="${LOGO}" class="logo"><div><div data-conn></div><p class="mt-1 text-slate-600 font-bold">Participants: ${present().length}</p></div></header><div class="hc">${c}</div></main>`;updateConn()}
